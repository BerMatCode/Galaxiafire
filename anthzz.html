<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👑 Admin - BerMatCode</title>
  <meta name="theme-color" content="#D97F88">
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    :root{--p:#E8A2A8;--pd:#D97F88;--l:#F6D1D5;--s:#F2B9BF;--bg:#fff9fb;--txt:#5a3a42;--sh:0 4px 20px rgba(217,127,136,.25)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Patrick Hand',cursive;background:linear-gradient(135deg,#fff5f7,#fde8ea);color:var(--txt);min-height:100vh;padding:20px}
    .container{max-width:1200px;margin:0 auto}
    
    /* Login */
    #loginScreen{display:flex;justify-content:center;align-items:center;min-height:80vh}
    .login-card{background:white;border-radius:24px;padding:40px;max-width:400px;width:100%;box-shadow:var(--sh);border:2px solid var(--p);text-align:center}
    .login-card h2{color:var(--pd);margin-bottom:20px;font-size:2em}
    .login-card input{width:100%;padding:12px 15px;margin:10px 0;border:2px solid var(--s);border-radius:12px;font-family:inherit;font-size:1.1em}
    .login-card input:focus{outline:none;border-color:var(--p)}
    .login-card .btn{width:100%;padding:14px;margin-top:15px;border:none;border-radius:50px;font-family:inherit;font-size:1.2em;cursor:pointer;background:linear-gradient(135deg,var(--p),var(--pd));color:white;transition:transform .3s}
    .login-card .btn:hover{transform:translateY(-3px)}
    #loginErr{color:#d9534f;margin-top:10px;display:none}
    
    /* Dashboard */
    #dashboard{display:none}
    header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;margin-bottom:25px;border-bottom:2px solid var(--s)}
    header h1{color:var(--pd);font-size:2em}
    .logout-btn{padding:10px 25px;background:white;border:2px solid var(--p);border-radius:50px;font-family:inherit;color:var(--txt);cursor:pointer;transition:.3s}
    .logout-btn:hover{background:var(--p);color:white}
    
    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:25px}
    .stat-card{background:white;padding:20px;border-radius:16px;box-shadow:var(--sh);border-left:4px solid var(--p);text-align:center}
    .stat-card .num{font-size:2em;color:var(--pd);font-weight:bold}
    .stat-card .label{opacity:.8;font-size:.95em}
    
    /* Table */
    .table-container{background:white;border-radius:20px;box-shadow:var(--sh);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{background:linear-gradient(135deg,var(--p),var(--pd));color:white;padding:15px;text-align:left;font-weight:bold}
    td{padding:12px 15px;border-bottom:1px solid var(--s)}
    tr:hover{background:#fff5f7}
    .actions{display:flex;gap:8px}
    .btn-sm{padding:6px 12px;border:none;border-radius:8px;font-family:inherit;font-size:.9em;cursor:pointer;transition:.2s}
    .btn-view{background:var(--l);color:var(--txt)}
    .btn-edit{background:var(--p);color:white}
    .btn-delete{background:#ff6b6b;color:white}
    .btn-sm:hover{transform:scale(1.05)}
    
    /* Modal */
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000;backdrop-filter:blur(6px)}
    .modal.active{display:flex;animation:fadeIn .3s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-content{background:white;padding:30px;border-radius:20px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.25);border:3px solid var(--p)}
    .modal-content h3{color:var(--pd);margin-bottom:20px;font-size:1.6em}
    .modal-content .field{margin:15px 0}
    .modal-content label{display:block;font-weight:bold;color:var(--pd);margin-bottom:5px}
    .modal-content input,.modal-content textarea{width:100%;padding:10px;border:2px solid var(--s);border-radius:10px;font-family:inherit}
    .modal-content textarea{min-height:100px;resize:vertical}
    .modal-buttons{display:flex;gap:12px;justify-content:flex-end;margin-top:25px}
    .modal-buttons button{padding:10px 25px;border:none;border-radius:50px;font-family:inherit;font-size:1em;cursor:pointer}
    .modal-buttons .save{background:var(--p);color:white}
    .modal-buttons .cancel{background:#e8e8e8;color:var(--txt)}
    
    /* Responsive */
    @media(max-width:768px){table{font-size:.9em}th,td{padding:10px 8px}.actions{flex-direction:column}}
  </style>
</head>
<body>
  <div class="container">
    <!-- Login -->
    <div id="loginScreen">
      <div class="login-card">
        <h2>👑 Acceso Admin</h2>
        <p style="opacity:.8;margin-bottom:20px">Ingresa la contraseña para gestionar galaxias</p>
        <input type="password" id="adminPass" placeholder="••••••" maxlength="10">
        <p id="loginErr">❌ Contraseña incorrecta</p>
        <button class="btn" id="loginBtn">🔐 Ingresar</button>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
      <header>
        <h1>👑 Panel de Administración</h1>
        <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
      </header>

      <div class="stats">
        <div class="stat-card"><div class="num" id="totalGalaxies">0</div><div class="label">Galaxias Creadas</div></div>
        <div class="stat-card"><div class="num" id="todayGalaxies">0</div><div class="label">Hoy</div></div>
        <div class="stat-card"><div class="num" id="withMusic">0</div><div class="label">Con Música</div></div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Frases</th>
              <th>Música</th>
              <th>Creado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="galaxyTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal Editar -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <h3>✏️ Editar Galaxia</h3>
      <input type="hidden" id="editId">
      <div class="field">
        <label>Título</label>
        <input type="text" id="editTitle" maxlength="100">
      </div>
      <div class="field">
        <label>Frases (una por línea, máx 15)</label>
        <textarea id="editPhrases" maxlength="500"></textarea>
      </div>
      <div class="field">
        <label>Música (URL MP3)</label>
        <input type="url" id="editMusic" maxlength="500">
      </div>
      <div class="field">
        <label>Imagen Núcleo (URL)</label>
        <input type="url" id="editNucleus" maxlength="500">
      </div>
      <div class="field">
        <label>Créditos</label>
        <input type="text" id="editCredits" maxlength="60">
      </div>
      <div class="modal-buttons">
        <button class="cancel" id="editCancel">Cancelar</button>
        <button class="save" id="editSave">💾 Guardar Cambios</button>
      </div>
    </div>
  </div>

  <!-- Modal Loading -->
  <div class="modal" id="loadModal">
    <div class="modal-content" style="text-align:center">
      <div style="width:40px;height:40px;border:4px solid var(--s);border-top-color:var(--p);border-radius:50%;margin:20px auto;animation:spin 1s linear infinite"></div>
      <p>Cargando...</p>
    </div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAVQn_t-gwbA75W6c1FLLP7OnzuU2jhbs0",
      authDomain: "galaxia-2026.firebaseapp.com",
      projectId: "galaxia-2026",
      storageBucket: "galaxia-2026.firebasestorage.app",
      messagingSenderId: "30252830415",
      appId: "1:30252830415:web:463fbdc73c3fb730d671ba",
      measurementId: "G-XCSVYH6KEG"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const VALID_PASS = "101123";
    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('dashboard');
    const adminPass = document.getElementById('adminPass');
    const loginBtn = document.getElementById('loginBtn');
    const loginErr = document.getElementById('loginErr');
    const logoutBtn = document.getElementById('logoutBtn');
    const galaxyTable = document.getElementById('galaxyTable');
    const totalGalaxies = document.getElementById('totalGalaxies');
    const todayGalaxies = document.getElementById('todayGalaxies');
    const withMusic = document.getElementById('withMusic');
    const editModal = document.getElementById('editModal');
    const editId = document.getElementById('editId');
    const editTitle = document.getElementById('editTitle');
    const editPhrases = document.getElementById('editPhrases');
    const editMusic = document.getElementById('editMusic');
    const editNucleus = document.getElementById('editNucleus');
    const editCredits = document.getElementById('editCredits');
    const editCancel = document.getElementById('editCancel');
    const editSave = document.getElementById('editSave');
    const loadModal = document.getElementById('loadModal');

    // Login
    loginBtn.onclick = () => {
      if (adminPass.value.trim() === VALID_PASS) {
        loginScreen.style.display = 'none';
        dashboard.style.display = 'block';
        loadGalaxies();
      } else {
        loginErr.style.display = 'block';
        adminPass.value = '';
      }
    };
    adminPass.onkeypress = e => { if (e.key === 'Enter') loginBtn.click(); };
    logoutBtn.onclick = () => { location.reload(); };

    // Cargar galaxias
    async function loadGalaxies() {
      loadModal.classList.add('active');
      try {
        const snap = await getDocs(collection(db, "galaxies"));
        const galaxies = [];
        snap.forEach(doc => { galaxies.push({ id: doc.id, ...doc.data() }); });
        
        // Ordenar por fecha (más reciente primero)
        galaxies.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
        
        // Stats
        totalGalaxies.textContent = galaxies.length;
        const today = new Date().toDateString();
        todayGalaxies.textContent = galaxies.filter(g => new Date(g.createdAt||0).toDateString() === today).length;
        withMusic.textContent = galaxies.filter(g => g.musicUrl && g.musicUrl !== "https://github.com/BerMatCode/Archivos/raw/refs/heads/main/Multimedia/TikVid.io_7471239338752363781.mp3").length;
        
        // Render table
        renderTable(galaxies);
      } catch (err) {
        console.error('Error cargando galaxias:', err);
        alert('❌ Error al cargar datos');
      } finally {
        loadModal.classList.remove('active');
      }
    }

    function renderTable(galaxies) {
      galaxyTable.innerHTML = '';
      if (galaxies.length === 0) {
        galaxyTable.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;opacity:.7">No hay galaxias creadas aún</td></tr>';
        return;
      }
      
      galaxies.forEach(g => {
        const tr = document.createElement('tr');
        const created = g.createdAt ? new Date(g.createdAt).toLocaleString('es-PE', {dateStyle:'short',timeStyle:'short'}) : '-';
        const phrasesCount = Array.isArray(g.phrases) ? g.phrases.length : 0;
        const hasCustomMusic = g.musicUrl && !g.musicUrl.includes('TikVid.io');
        
        tr.innerHTML = `
          <td><strong>${escapeHtml(g.title||'Sin título')}</strong></td>
          <td>${phrasesCount}/15</td>
          <td>${hasCustomMusic ? '✅ Personalizada' : '🎵 Por defecto'}</td>
          <td style="font-size:.9em;opacity:.85">${created}</td>
          <td class="actions">
            <button class="btn-sm btn-view" data-id="${g.id}">👁️ Ver</button>
            <button class="btn-sm btn-edit" data-id="${g.id}">✏️</button>
            <button class="btn-sm btn-delete" data-id="${g.id}">🗑️</button>
          </td>
        `;
        galaxyTable.appendChild(tr);
      });
      
      // Event listeners para acciones
      galaxyTable.querySelectorAll('.btn-view').forEach(btn => {
        btn.onclick = e => {
          const id = e.target.dataset.id;
          const url = `${location.origin}/index.html?id=${id}`;
          window.open(url, '_blank');
        };
      });
      galaxyTable.querySelectorAll('.btn-edit').forEach(btn => {
        btn.onclick = e => openEditModal(e.target.dataset.id, galaxies.find(g => g.id === e.target.dataset.id));
      });
      galaxyTable.querySelectorAll('.btn-delete').forEach(btn => {
        btn.onclick = e => confirmDelete(e.target.dataset.id);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Modal Editar
    function openEditModal(id, data) {
      editId.value = id;
      editTitle.value = data.title || '';
      editPhrases.value = Array.isArray(data.phrases) ? data.phrases.join('\n') : '';
      editMusic.value = data.musicUrl || '';
      editNucleus.value = data.nucleusImage || '';
      editCredits.value = data.credits || '';
      editModal.classList.add('active');
    }
    editCancel.onclick = () => editModal.classList.remove('active');
    
    editSave.onclick = async () => {
      const id = editId.value;
      if (!id) return;
      
      const phrases = editPhrases.value.split('\n').map(p => p.trim()).filter(p => p).slice(0,15);
      if (phrases.length === 0) return alert('⚠️ Agrega al menos una frase');
      
      loadModal.classList.add('active');
      try {
        await updateDoc(doc(db, "galaxies", id), {
          title: editTitle.value.trim(),
          phrases: phrases,
          musicUrl: editMusic.value.trim(),
          nucleusImage: editNucleus.value.trim(),
          credits: editCredits.value.trim(),
          updatedAt: Date.now()
        });
        editModal.classList.remove('active');
        alert('✅ Cambios guardados');
        loadGalaxies();
      } catch (err) {
        alert('❌ Error: ' + err.message);
        console.error(err);
      } finally {
        loadModal.classList.remove('active');
      }
    };

    // Eliminar
    async function confirmDelete(id) {
      if (!confirm('⚠️ ¿Estás seguro de eliminar esta galaxia?\nEsta acción no se puede deshacer.')) return;
      
      loadModal.classList.add('active');
      try {
        await deleteDoc(doc(db, "galaxies", id));
        alert('✅ Galaxia eliminada');
        loadGalaxies();
      } catch (err) {
        alert('❌ Error: ' + err.message);
      } finally {
        loadModal.classList.remove('active');
      }
    }

    // Prevenir salida accidental
    window.onbeforeunload = e => {
      if (dashboard.style.display === 'block') {
        e.preventDefault();
        e.returnValue = '';
      }
    };
  </script>
</body>
</html>
