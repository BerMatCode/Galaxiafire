<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#38bdf8" />
<title>BerMatCode — Admin Galaxia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f5fa;--surface:#ffffff;--card:#f8fbff;--primary:#0ea5e9;--primary-light:#38bdf8;--glow:rgba(14,165,233,.25);--text:#0f172a;--text-sec:#475569;--text-muted:#94a3b8;--border:#e2e8f0;--danger:#ef4444;--success:#10b981;--warn:#f59e0b;--radius:16px;--shadow:0 4px 24px rgba(0,0,0,.06);--transition:all .25s cubic-bezier(.4,0,.2,1)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.login-page{position:fixed;inset:0;background:linear-gradient(140deg,#f0f5fa 0%,#e0f2fe 50%,#f0f5fa 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-page.hide{display:none}
.login-card{background:var(--surface);border-radius:22px;padding:40px;width:380px;max-width:90vw;box-shadow:0 20px 60px var(--glow);text-align:center;border:1.5px solid var(--border)}
.login-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:1.5rem;color:#fff}
.login-input{width:100%;padding:14px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);text-align:center;outline:none;margin-bottom:12px}
.login-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.app{display:none}.app.active{display:block}
.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.h-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 20px}
.search{width:100%;padding:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;margin-bottom:20px}
.container{max-width:750px;margin:0 auto;padding:20px}
.list{display:flex;flex-direction:column;gap:12px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:15px;transition:var(--transition)}
.card:hover{box-shadow:var(--shadow);border-color:var(--primary-light)}
.c-title{font-size:0.95rem;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-meta{font-size:0.75rem;color:var(--text-muted);display:flex;gap:8px;margin-bottom:6px}
.c-prev{font-size:0.85rem;color:var(--text-sec);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;gap:6px;margin-top:8px}
.tag{font-size:0.65rem;padding:4px 10px;border-radius:15px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:0.2s}
.tag.sel{background:rgba(239,68,68,0.1);border-color:var(--danger);color:var(--danger);font-weight:600}
.tag.perm{background:rgba(16,185,129,0.1);border-color:var(--success);color:var(--success);font-weight:600}
.c-actions{display:flex;flex-direction:column;gap:5px;min-width:90px}
.btn{padding:7px 10px;border:none;border-radius:8px;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:0.2s}
.btn-i{background:var(--card);color:var(--primary);border:1px solid var(--border)}
.btn-d{background:rgba(239,68,68,0.1);color:var(--danger)}
.btn:hover{transform:translateY(-1px)}
.ov{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:0.2s}
.ov.on{opacity:1;visibility:visible}
.m-box{background:var(--surface);border-radius:18px;width:450px;max-width:95vw;max-height:85vh;overflow-y:auto;padding:20px;transform:scale(0.95);transition:0.3s}
.ov.on .m-box{transform:scale(1)}
.m-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px}
.fi,.ft{width:100%;padding:10px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;margin-bottom:10px;color:var(--text)}
.ft{min-height:90px;resize:vertical}
.btn-act{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;margin-top:5px}
.conf-body{text-align:center;padding:20px 10px}
.conf-btns{display:flex;gap:10px;justify-content:center;margin-top:15px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);padding:10px 20px;border-radius:10px;opacity:0;transition:0.3s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.card{flex-direction:column}.c-actions{flex-direction:row;width:100%}}
</style>
</head>
<body>
<div class="login-page" id="loginOv">
  <div class="login-card">
    <div class="login-icon"><i class="fas fa-lock"></i></div>
    <h2>Admin Galaxia</h2>
    <input type="password" id="loginPw" class="login-input" placeholder="Contraseña">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div class="app" id="app">
  <header class="header"><div class="h-inner"><b>𖤍 Admin Galaxia 𖤍</b><button class="btn btn-i" onclick="loadData()"><i class="fas fa-sync-alt"></i></button></div></header>
  <div class="container">
    <input type="text" class="search" id="searchInp" placeholder="Buscar por título o frase...">
    <div class="list" id="list"></div>
  </div>
</div>

<!-- Modals -->
<div class="ov" id="ovEdit"><div class="m-box">
  <div class="m-head"><h4>✏️ Editar Galaxia</h4><button class="btn btn-i" onclick="closeM('ovEdit')">✕</button></div>
  <input type="hidden" id="eId">
  <label>Título</label><input id="eTitle" class="fi">
  <label>Frases (coma)</label><textarea id="ePhr" class="ft"></textarea>
  <label>Créditos / Núcleo <i style="font-size:0.7em;color:#888">(Requiere Token)</i></label>
  <input type="password" id="tokenInp" class="fi" placeholder="Ingresa token 101123 para desbloquear">
  <input type="text" id="eCred" class="fi" placeholder="Créditos" disabled>
  <input type="text" id="eCore" class="fi" placeholder="URL Imagen Núcleo" disabled>
  <button class="btn-act" onclick="saveEdit()">Guardar Cambios</button>
</div></div>

<div class="ov" id="ovDel"><div class="m-box">
  <div class="conf-body"><h3>⚠️ ¿Eliminar?</h3><p style="margin:10px 0;color:#666">Esta acción no se puede deshacer.</p></div>
  <div class="conf-btns"><button class="btn btn-i" onclick="closeM('ovDel')">Cancelar</button><button class="btn btn-d" onclick="confirmDel()"><i class="fas fa-trash"></i> Eliminar</button></div>
</div></div>

<div class="ov" id="ovToken"><div class="m-box" style="text-align:center">
  <div class="conf-body"><h3>🔐 Token Requerido</h3><p style="margin:8px 0 15px;color:#666">Ingresa el token de administrador para editar campos protegidos.</p></div>
  <input type="password" id="modalTok" class="fi" placeholder="Token: 101123" style="text-align:center">
  <button class="btn-act" onclick="verifyToken()">Verificar</button>
</div></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyAVQn_t-gwbA75W6c1FLLP7OnzuU2jhbs0", authDomain: "galaxia-2026.firebaseapp.com",
  projectId: "galaxia-2026", storageBucket: "galaxia-2026.firebasestorage.app",
  messagingSenderId: "30252830415", appId: "1:30252830415:web:463fbdc73c3fb730d671ba", measurementId: "G-XCSVYH6KEG"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let items = [];
window.TAGS_KEY = "galaxia_admin_tags";
window.delId = null;

window.doLogin = () => {
  if(document.getElementById('loginPw').value === 'BerMatCode') {
    localStorage.setItem('gadmin', '1');
    document.getElementById('loginOv').classList.add('hide');
    document.getElementById('app').classList.add('active');
    loadData();
  } else alert('Clave incorrecta');
};
if(localStorage.getItem('gadmin')==='1') { document.getElementById('loginOv').classList.add('hide'); document.getElementById('app').classList.add('active'); loadData(); }

window.loadData = async () => {
  const snap = await getDocs(query(collection(db,"messages"),orderBy("createdAt","desc")));
  items = snap.docs.map(d=>({id:d.id,...d.data()})); render();
};

function render() {
  const term = document.getElementById('searchInp').value.toLowerCase();
  const f = items.filter(i=>(i.title||'').toLowerCase().includes(term)||(Array.isArray(i.phrases)?i.phrases.join(' '):'').toLowerCase().includes(term));
  document.getElementById('list').innerHTML = f.length ? f.map(i=>{
    const tags = JSON.parse(localStorage.getItem(window.TAGS_KEY)||'{}');
    const t24 = tags[i.id]==='24h'?'sel':'', tp = tags[i.id]==='perm'?'perm':'';
    return `<div class="card"><div><div class="c-title">${esc(i.title||'Sin Título')}</div><div class="c-meta"><i class="fas fa-circle"></i>${formatDate(i.createdAt)}</div><div class="c-prev">${esc(Array.isArray(i.phrases)?i.phrases.join(', '):'')}</div><div class="tags"><span class="tag ${t24}" onclick="setTag('${i.id}','24h')">⏱ 24h</span><span class="tag ${tp}" onclick="setTag('${i.id}','perm')">🟢 Permanente</span></div></div><div class="c-actions"><button class="btn btn-i" onclick="openEdit('${i.id}')"><i class="fas fa-pen"></i> Editar</button><button class="btn btn-d" onclick="askDel('${i.id}')"><i class="fas fa-trash"></i></button></div></div>`;
  }).join('') : '<div style="text-align:center;padding:40px;color:#999">Sin datos</div>';
}

window.setTag = (id, type) => {
  const s = JSON.parse(localStorage.getItem(window.TAGS_KEY)||'{}');
  if(s[id]===type) delete s[id]; else s[id]=type;
  localStorage.setItem(window.TAGS_KEY,JSON.stringify(s)); render();
};

window.openEdit = (id) => {
  const i = items.find(x=>x.id===id);
  document.getElementById('eId').value = id;
  document.getElementById('eTitle').value = i.title||'';
  document.getElementById('ePhr').value = (i.phrases||[]).join(', ');
  document.getElementById('eCred').value = i.credits||'𖤍BerMatCode𖤍';
  document.getElementById('eCore').value = i.coreImageUrl||'';
  document.getElementById('eCred').disabled = true; document.getElementById('eCore').disabled = true;
  document.getElementById('tokenInp').value = '';
  openM('ovEdit');
};

window.saveEdit = async () => {
  const id = document.getElementById('eId').value;
  const t = document.getElementById('tokenInp').value.trim();
  if(t !== '101123') return toast('❌ Token incorrecto. Campos protegidos no editados.','error');
  
  const d = {
    title: document.getElementById('eTitle').value.trim(),
    phrases: document.getElementById('ePhr').value.split(',').map(s=>s.trim()).filter(Boolean),
    credits: document.getElementById('eCred').value.trim(),
    coreImageUrl: document.getElementById('eCore').value.trim(),
    updatedAt: serverTimestamp()
  };
  try {
    await updateDoc(doc(db,"messages",id), d);
    closeM('ovEdit'); toast('✅ Guardado correctamente','success'); loadData();
  } catch(e) { toast('❌ Error: '+e.message,'error'); }
};

window.askDel = (id) => { window.delId = id; openM('ovDel'); };
window.confirmDel = async () => {
  if(!window.delId) return;
  try {
    await deleteDoc(doc(db,"messages",window.delId));
    const s = JSON.parse(localStorage.getItem(window.TAGS_KEY)||'{}'); delete s[window.delId]; localStorage.setItem(window.TAGS_KEY,JSON.stringify(s));
    closeM('ovDel'); toast('🗑 Eliminado','success'); loadData();
  } catch(e) { toast('❌ Error','error'); }
};

window.verifyToken = () => {
  const v = document.getElementById('modalTok').value.trim();
  if(v==='101123') {
    document.getElementById('eCred').disabled = false; document.getElementById('eCore').disabled = false;
    document.getElementById('tokenInp').value = '101123';
    toast('🔓 Campos desbloqueados','success'); closeM('ovToken');
  } else toast('❌ Token inválido','error');
};

function openM(id){document.getElementById(id).classList.add('on')}
window.closeM = function(id){document.getElementById(id).classList.remove('on')}
function formatDate(ts){ if(!ts) return '-'; const d = ts.toDate(); return d.toLocaleDateString('es',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}); }
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m,t='info'){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');if(t) e.style.borderColor=t==='success'?'#28a745':'#ef4444';clearTimeout(e._t);e._t=setTimeout(()=>{e.classList.remove('show');},2500);}
document.getElementById('searchInp').addEventListener('input', render);
setInterval(()=>{if(localStorage.getItem('gadmin'))loadData();},8000);
</script>
</body>
</html>
