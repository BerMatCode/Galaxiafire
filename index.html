const params = new URLSearchParams(window.location.search);

async function loadGalaxyData(id) {
  try {
    const docSnap = await getDoc(doc(db, "messages", id));
    if (docSnap.exists()) {
      const d = docSnap.data();
      document.getElementById('main-title').textContent = d.title || "Te Amo Yorchi";
      document.getElementById('entry-text').textContent = d.entryText || "💖Toca la pantalla💘";
      document.getElementById('credits').textContent = d.credits || "𖤍BerMatCode𖤍";
      const music = document.getElementById('background-music');
      music.src = d.musicUrl || 'https://github.com/BerMatCode/Archivos/raw/refs/heads/main/Multimedia/TikVid.io_7471239338752363781.mp3';
      
      // Iniciar escena después de aplicar datos
      window.DYNAMIC_CONFIG = {
        phrases: Array.isArray(d.phrases) ? d.phrases : ["Siempre contigo", "Eres mi calma", "Me haces feliz", "Tu sonrisa brilla", "Qué bonito coincidir", "Mi lugar favorito", "Contigo todo mejora", "Tu luz me inspira", "Eres increíble", "Gracias por existir", "Mi corazón te elige", "Qué suerte tenerte", "Eres mi paz"],

          'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda2.png',

        ],

      };
      initThreeJS();
    } else { showErrorModal(); }
  } catch (e) { showErrorModal(); }
}

function showErrorModal() {
  document.getElementById('error-modal').classList.add('active');
  const btn = document.getElementById('whatsapp-btn');
  const name = msgId ? `ID: ${msgId.substring(0,8)}...` : 'Sin ID';

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const defConfig = {
  phrases: ["Siempre contigo", "Eres mi calma", "Me haces feliz", "Tu sonrisa brilla", "Qué bonito coincidir", "Mi lugar favorito", "Contigo todo mejora", "Tu luz me inspira", "Eres increíble", "Gracias por existir", "Mi corazón te elige", "Qué suerte tenerte", "Eres mi paz"],
  images: ['https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda2.png','https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda3.png','https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda6.png'],
  coreImg: 'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/imagen%20del%20n%C3%BAcleo.png'
};
const cfg = window.DYNAMIC_CONFIG || defConfig;

const CONFIG = {
  galaxy: { rotationSpeed: 0.12, centerExclusionRadius: 45 },
  elementExclusionRadius: 40,
  blackHole: { radius: 12, segments: 64, imageUrl: cfg.coreImg },
  accretionDisk: { innerRadius: 18, outerRadius: 65, particleCount: 8000, particleSize: 0.28, colors: ['#E8A2A8', '#D97F88', '#F6D1D5', '#F2B9BF', '#FFB6C1'], brightness: 0.18, orbitalRings: 18, ringParticleBase: 600, ringParticleIncrement: 55 },
  particles: {
    coreStars: { count: 25000, radius: 140, maxHeight: 70, size: 0.2 },
    sphericalHalo: { count: 22000, radiusXZ: 130, radiusY: 65, size: 0.15, minDistFromCenter: 32 },
    backgroundStars: { count: 12000, radius: 800, size: 0.1, floatSpeed: 0.012 },
    floatingSpace: { count: 5000, radius: 280, size: 0.2, speed: 0.005 },
    texts: { count: 50, width: 45, height: 20, minRadius: null, maxRadius: 140, content: cfg.phrases, colors: [{ fill: '#E8A2A8', shadow: '#D97F88' }, { fill: '#F6D1D5', shadow: '#E8A2A8' }, { fill: '#F2B9BF', shadow: '#D97F88' }] },
    emojis: { count: 25, size: 10, minRadius: null, maxRadius: 140, content: cfg.images, colors: [{ fill: '#F6D1D5', shadow: '#D97F88' }, { fill: '#F2B9BF', shadow: '#E8A2A8' }, { fill: '#E8A2A8', shadow: '#D97F88' }] }
  },
  shootingStars: { enabled: true, spawnProbability: 0.007, speed: 1.2 },
  lighting: { ambientLight: { color: '#ffffff', intensity: 0.06 }, pointLight: { color: '#E8A2A8', intensity: 1.5, distance: 400 } },
  bloomEffect: { threshold: 0.45, strength: 0.4, radius: 0.3 },
  cameraControls: { minDistance: 30, maxDistance: 300 },
  performance: { updateInterval: 2, floatUpdateInterval: 3 }
};

let scene, camera, renderer, controls, galaxyGroup, clock, composer;
let loveTexts = [], loveImages = [], shootingStars = [], floatingParticles = [], orbitalParticles = [];
let occupiedPositions = []; let frameCount = 0;

function initThreeJS() {
  scene = new THREE.Scene(); clock = new THREE.Clock();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1500);
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy-canvas'), antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.05;
  controls.minDistance = CONFIG.cameraControls.minDistance; controls.maxDistance = CONFIG.cameraControls.maxDistance; controls.enablePan = false;

  const renderScene = new RenderPass(scene, camera);
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.35, 0.75);
  bloomPass.threshold = CONFIG.bloomEffect.threshold; bloomPass.strength = CONFIG.bloomEffect.strength; bloomPass.radius = CONFIG.bloomEffect.radius;
  composer = new EffectComposer(renderer); composer.addPass(renderScene); composer.addPass(bloomPass);

  const { ambientLight, pointLight } = CONFIG.lighting;
  scene.add(new THREE.AmbientLight(ambientLight.color, ambientLight.intensity));
  const mainLight = new THREE.PointLight(pointLight.color, pointLight.intensity, pointLight.distance);
  mainLight.position.set(0, 0, 0); scene.add(mainLight);
  galaxyGroup = new THREE.Group(); scene.add(galaxyGroup);

  createBlackHole(); createAccretionDiskParticles(); createOrbitalRings();
  createCoreStars(); createSphericalHalo(); createBackgroundStars();
  createFloatingSpaceParticles(); createLoveElements();
  window.addEventListener('resize', onWindowResize); onWindowResize(); animate();
}

function createBlackHole() {
  const texLoader = new THREE.TextureLoader();
  const tex = texLoader.load(CONFIG.blackHole.imageUrl, t => t.colorSpace = THREE.SRGBColorSpace);
  const sphere = new THREE.Mesh(new THREE.SphereGeometry(CONFIG.blackHole.radius, CONFIG.blackHole.segments, CONFIG.blackHole.segments), new THREE.MeshBasicMaterial({ map: tex, transparent: false }));
  scene.add(sphere); return sphere;
}
function createAccretionDiskParticles() {
  const cfg = CONFIG.accretionDisk, geo = new THREE.BufferGeometry();
  const pos = new Float32Array(cfg.particleCount * 3), col = new Float32Array(cfg.particleCount * 3);
  const c = new THREE.Color();
  for(let i=0;i<cfg.particleCount;i++){
    const r = cfg.innerRadius + Math.random()*(cfg.outerRadius-cfg.innerRadius), a = Math.random()*Math.PI*2;
    pos.set([r*Math.cos(a), (Math.random()-0.5)*0.5, r*Math.sin(a)], i*3);
    c.set(cfg.colors[Math.floor(Math.random()*cfg.colors.length)]);
    col.set([c.r*cfg.brightness, c.g*cfg.brightness, c.b*cfg.brightness], i*3);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({ size: cfg.particleSize, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, opacity: 0.8, depthWrite: false }));
  galaxyGroup.add(pts); return pts;
}
function createOrbitalRings() {
  const cfg = CONFIG.accretionDisk;
  for(let r=0;r<cfg.orbitalRings;r++){
    const rad = cfg.innerRadius + (cfg.outerRadius-cfg.innerRadius)*(r/cfg.orbitalRings), cnt = Math.min(cfg.ringParticleBase+r*cfg.ringParticleIncrement,1000);
    const geo = new THREE.BufferGeometry(), pos = new Float32Array(cnt*3), col = new Float32Array(cnt*3);
    const c = new THREE.Color();
    for(let i=0;i<cnt;i++){
      const a = (i/cnt)*Math.PI*2; pos.set([rad*Math.cos(a), 0, rad*Math.sin(a)], i*3);
      c.set(cfg.colors[r%cfg.colors.length]);
      const b = cfg.brightness*(0.8+Math.random()*0.2);
      col.set([c.r*b, c.g*b, c.b*b], i*3);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    const ring = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.32, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, opacity: 0.9, depthWrite: false }));
    ring.userData = { radius: rad, speed: 0.0012+r*0.0002, offset: Math.random()*Math.PI*2 }; galaxyGroup.add(ring); orbitalParticles.push(ring);
  }
}
function createCoreStars() {
  const cfg = CONFIG.particles.coreStars, geo = new THREE.BufferGeometry();
  const pos = new Float32Array(cfg.count*3), col = new Float32Array(cfg.count*3), c = new THREE.Color();
  for(let i=0;i<cfg.count;i++){
    const d = CONFIG.accretionDisk.outerRadius+Math.random()*(cfg.radius-CONFIG.accretionDisk.outerRadius), a = Math.random()*Math.PI*2, y = (Math.random()-0.5)*cfg.maxHeight*Math.pow(1-(d/cfg.radius),1.5);
    pos.set([Math.cos(a)*d, y, Math.sin(a)*d], i*3);
    c.setHSL((0.82+Math.random()*0.12)%1, 0.8+Math.random()*0.2, 0.6+Math.random()*0.4);
    col.set([c.r, c.g, c.b], i*3);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  galaxyGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: cfg.size, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, depthWrite: false })));
}
function createSphericalHalo() {
  const cfg = CONFIG.particles.sphericalHalo, geo = new THREE.BufferGeometry();
  const pos = new Float32Array(cfg.count*3), col = new Float32Array(cfg.count*3), c = new THREE.Color();
  let filled=0;
  while(filled<cfg.count){
    const rx=(Math.random()*2-1), ry=(Math.random()*2-1), rz=(Math.random()*2-1);
    if(rx*rx+ry*ry+rz*rz>1) continue;
    const x=rx*cfg.radiusXZ, y=ry*cfg.radiusY, z=rz*cfg.radiusXZ, dist=Math.sqrt(x*x+y*y+z*z);
    if(dist<cfg.minDistFromCenter) continue;
    if(Math.random()>Math.pow(1-(dist/Math.max(cfg.radiusXZ,cfg.radiusY))*0.7,1.2)) continue;
    pos.set([x,y,z], filled*3); c.setHSL((0.82+Math.random()*0.12)%1, 0.6+Math.random()*0.4, 0.45+Math.random()*0.45);
    col.set([c.r,c.g,c.b], filled*3); filled++;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  galaxyGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: cfg.size, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, opacity: 0.65, depthWrite: false })));
}
function createBackgroundStars() {
  const cfg = CONFIG.particles.backgroundStars, geo = new THREE.BufferGeometry();
  const pos = new Float32Array(cfg.count*3), vel = new Float32Array(cfg.count*3);
  for(let i=0;i<cfg.count;i++){
    pos.set([(Math.random()-0.5)*2*cfg.radius, (Math.random()-0.5)*2*cfg.radius, (Math.random()-0.5)*2*cfg.radius], i*3);
    vel.set([(Math.random()-0.5)*cfg.floatSpeed, (Math.random()-0.5)*cfg.floatSpeed, (Math.random()-0.5)*cfg.floatSpeed], i*3);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('velocity', new THREE.BufferAttribute(vel, 3));
  const bg = new THREE.Points(geo, new THREE.PointsMaterial({ size: cfg.size, color: 0xffffff, transparent: true, opacity: 0.3, depthWrite: false }));
  bg.userData.isBackground = true; scene.add(bg);
}
function createFloatingSpaceParticles() {
  const cfg = CONFIG.particles.floatingSpace, geo = new THREE.BufferGeometry();
  const pos = new Float32Array(cfg.count*3), col = new Float32Array(cfg.count*3), vel = new Float32Array(cfg.count*3), c = new THREE.Color();
  for(let i=0;i<cfg.count;i++){
    const theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1), rad=cfg.radius*Math.pow(Math.random(),0.3);
    pos.set([rad*Math.sin(phi)*Math.cos(theta), rad*Math.cos(phi), rad*Math.sin(phi)*Math.sin(theta)], i*3);
    c.setHSL(0.8+Math.random()*0.15, 0.5+Math.random()*0.3, 0.7+Math.random()*0.25);
    col.set([c.r*0.4,c.g*0.4,c.b*0.4], i*3);
    vel.set([(Math.random()-0.5)*cfg.speed, (Math.random()-0.5)*cfg.speed, (Math.random()-0.5)*cfg.speed], i*3);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('color', new THREE.BufferAttribute(col, 3)); geo.setAttribute('velocity', new THREE.BufferAttribute(vel, 3));
  const fl = new THREE.Points(geo, new THREE.PointsMaterial({ size: cfg.size, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, opacity: 0.5, depthWrite: false }));
  fl.userData.isFloating = true; scene.add(fl); floatingParticles.push(fl);
}
function createLoveElements() {
  const tCfg = CONFIG.particles.texts, eCfg = CONFIG.particles.emojis;
  for(let i=0;i<tCfg.count;i++){
    const col=tCfg.colors[i%tCfg.colors.length], tex=createTextTexture(tCfg.content[i%tCfg.content.length], col);
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(tCfg.width, tCfg.height), new THREE.MeshPhongMaterial({ map:tex, transparent:true, alphaTest:0.1, emissive:col.fill, emissiveIntensity:1.2, depthWrite:false }));
    setPos(mesh, tCfg.minRadius, tCfg.maxRadius); galaxyGroup.add(mesh); loveTexts.push(mesh);
  }
  const tLoader = new THREE.TextureLoader();
  for(let i=0;i<eCfg.count;i++){
    const tex=tLoader.load(eCfg.content[i%eCfg.content.length], t=>{t.colorSpace=THREE.SRGBColorSpace;t.transparent=true;});
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
    sp.scale.set(eCfg.size,eCfg.size,1); setPos(sp, eCfg.minRadius, eCfg.maxRadius); galaxyGroup.add(sp); loveImages.push(sp);
  }
}
function setPos(el, minR, maxR) {
  const sr=minR||CONFIG.elementExclusionRadius, mx=maxR||CONFIG.particles.coreStars.radius;
  let ok=false, att=0, fp={x:0,y:0,z:0};
  while(!ok && att<40){
    att++; const r=sr+Math.random()*(mx-sr), a=Math.random()*Math.PI*2, y=(Math.random()-0.5)*20, x=r*Math.cos(a), z=r*Math.sin(a);
    ok=true;
    for(let p of occupiedPositions){ if(Math.sqrt(Math.pow(x-p.x,2)+Math.pow(y-p.y,2)+Math.pow(z-p.z,2))<22){ok=false;break;} }
    if(ok) fp={x,y,z};
  }
  el.position.set(fp.x,fp.y,fp.z); occupiedPositions.push(fp);
}
function createTextTexture(txt, col) {
  const cv=document.createElement('canvas'); cv.width=1536; cv.height=512;
  const ctx=cv.getContext('2d'); ctx.font='84px "Patrick Hand", cursive'; ctx.fillStyle=col.fill;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowColor=col.shadow; ctx.shadowBlur=3;
  const words=txt.split(' '); let lines=[], cur=words[0], mw=cv.width-100, lh=100;
  for(let i=1;i<words.length;i++){ const t=cur+' '+words[i]; if(ctx.measureText(t).width>mw && cur.length>0){lines.push(cur);cur=words[i];}else{cur=t;} }
  lines.push(cur); const sy=cv.height/2-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>ctx.fillText(l,cv.width/2,sy+i*lh));
  const tex=new THREE.CanvasTexture(cv); tex.needsUpdate=true; return tex;
}
function onWindowResize() {
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h); composer.setSize(w,h); camera.aspect=w/h;
  camera.position.set(0,45,w<768?190:160); camera.updateProjectionMatrix();
}
function animate() {
  requestAnimationFrame(animate); frameCount++;
  const e=clock.getElapsedTime(); galaxyGroup.rotation.y=e*CONFIG.galaxy.rotationSpeed;
  if(frameCount%CONFIG.performance.updateInterval===0) orbitalParticles.forEach(r=>r.rotation.y=e*r.userData.speed+r.userData.offset);
  loveTexts.forEach(t=>t.lookAt(camera.position)); loveImages.forEach(i=>i.lookAt(camera.position));
  if(CONFIG.shootingStars.enabled && Math.random()<CONFIG.shootingStars.spawnProbability){
    const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([0,0,0]),3));
    const s=new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:1.8,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false}));
    s.position.set(THREE.MathUtils.randFloatSpread(1000),THREE.MathUtils.randFloat(150,400),THREE.MathUtils.randFloatSpread(1000));
    s.userData.velocity=new THREE.Vector3((Math.random()<0.5?-1:1)*CONFIG.shootingStars.speed,-CONFIG.shootingStars.speed*0.5,(Math.random()-0.5)*2);
    s.userData.life=0; shootingStars.push(s); scene.add(s);
  }
  for(let i=shootingStars.length-1;i>=0;i--){
    shootingStars[i].position.add(shootingStars[i].userData.velocity); shootingStars[i].userData.life++;
    if(shootingStars[i].userData.life>350){scene.remove(shootingStars[i]);shootingStars.splice(i,1);}
  }
  controls.update(); composer.render();
}
window.initThreeJS = initThreeJS;
</script>
