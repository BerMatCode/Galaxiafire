<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Te Amo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Patrick Hand', cursive;
            background: #0a0a0f;
            color: #F6D1D5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .error-container {
            max-width: 600px;
            padding: 40px;
            background: rgba(246, 209, 213, 0.08);
            border-radius: 25px;
            border: 2px solid rgba(232, 162, 168, 0.3);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .error-title {
            font-size: 2.2em;
            color: #E8A2A8;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(232, 162, 168, 0.5);
        }
        
        .error-message {
            font-size: 1.3em;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #F2B9BF;
        }
        
        .error-hint {
            font-size: 1.1em;
            color: #D97F88;
            margin-bottom: 25px;
            font-style: italic;
        }
        
        .btn-create {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #E8A2A8, #D97F88);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3em;
            font-family: 'Patrick Hand', cursive;
            box-shadow: 0 8px 25px rgba(217, 127, 136, 0.4);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(217, 127, 136, 0.6);
        }
        
        .btn-create:active {
            transform: translateY(-1px);
        }
        
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(246, 209, 213, 0.6);
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        @media (max-width: 480px) {
            .error-container { padding: 30px 25px; }
            .error-title { font-size: 1.8em; }
            .error-message { font-size: 1.15em; }
            .btn-create { padding: 12px 30px; font-size: 1.15em; }
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div class="particles" id="particles"></div>
    
    <!-- Contenido de error -->
    <div class="error-container">
        <div class="error-icon">🌌</div>
        <h1 class="error-title">Galaxia No Encontrada</h1>
        <p class="error-message">
            Lo sentimos, no pudimos encontrar la configuración de tu galaxia personalizada.<br><br>
            Es posible que el archivo haya sido eliminado, el enlace esté incorrecto, 
            o aún no hayas creado tu universo.
        </p>
        <p class="error-hint">✨ ¿Quieres crear tu propia galaxia del amor?</p>
        <a href="panel.html" class="btn-create">Crear mi Galaxia 💖</a>
    </div>

    <script>
        // Crear partículas animadas de fondo
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (2 + Math.random() * 3) + 's';
                container.appendChild(particle);
            }
        }
        
        // Verificar si hay ID de galaxia en la URL
        function checkGalaxiaId() {
            const urlParams = new URLSearchParams(window.location.search);
            const galaxiaId = urlParams.get('id');
            
            if (galaxiaId) {
                // Aquí se cargaría la configuración desde Firebase
                // Por simplicidad, mostramos el error si no se implementa el loader
                console.log('Buscando galaxia con ID:', galaxiaId);
                // En producción: cargar desde Firestore y renderizar la galaxia
            }
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            checkGalaxiaId();
        });
    </script>
</body>
</html>
