<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#000;font-family:'Patrick Hand',cursive;cursor:grab;-webkit-user-select:none;user-select:none}
body:active{cursor:grabbing}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
#main-title{position:absolute;top:40px;left:50%;transform:translateX(-50%);font-size:4.5em;color:#F6D1D5;text-shadow:0 0 15px #E8A2A8,0 0 25px #D97F88;z-index:10;pointer-events:none;text-align:center;white-space:nowrap}
#entry-screen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;z-index:9999;background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);cursor:pointer}
#entry-text{font-size:2.5em;color:#F6D1D5;text-shadow:0 0 20px #E8A2A8,0 0 40px #D97F88;animation:pulse 2s infinite;padding:30px 50px;background:rgba(246,209,213,0.1);border-radius:20px;border:2px solid rgba(232,162,168,0.3)}
@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
#credits{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);font-size:0.9em;color:#F6D1D5;text-shadow:0 0 10px #E8A2A8;z-index:50;pointer-events:none;white-space:nowrap}
/* Error & Load Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:10000;padding:20px}
.modal-overlay.active{display:flex}
.modal-card{background:linear-gradient(145deg,#0f172a,#1e293b);border:2px solid #38bdf8;border-radius:20px;padding:28px;max-width:420px;width:100%;text-align:center;color:#f1f5f9;animation:slideUp 0.4s ease;position:relative}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-icon{font-size:2.8rem;margin-bottom:12px;color:#f87171}
.modal-title{font-family:'Patrick Hand',cursive;font-size:1.6rem;color:#38bdf8;margin-bottom:10px}
.modal-text{font-size:0.95rem;line-height:1.5;color:#94a3b8;margin-bottom:18px}
.modal-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border:none;border-radius:25px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;transition:0.3s;font-size:0.9rem}
.modal-btn.wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff}
.modal-btn.wa:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(37,211,102,0.4)}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#64748b;font-size:1.4rem;cursor:pointer}
.modal-close:hover{color:#38bdf8}
.spinner{width:40px;height:40px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;margin:0 auto 15px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){#main-title{font-size:3.4em;top:25px}#entry-text{font-size:2em}#credits{font-size:0.8em;bottom:10px}.modal-card{padding:22px}}
</style>

<body>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const fbConfig = { apiKey:"AIzaSyAVQn_t-gwbA75W6c1FLLP7OnzuU2jhbs0", authDomain:"galaxia-2026.firebaseapp.com", projectId:"galaxia-2026", storageBucket:"galaxia-2026.firebasestorage.app", messagingSenderId:"30252830415", appId:"1:30252830415:web:463fbdc73c3fb730d671ba" };
initializeApp(fbConfig); const db = getFirestore();

const CONFIG = {
  galaxy:{rotationSpeed:0.12}, elementExclusionRadius:40,
  blackHole:{radius:12,segments:64,imageUrl:'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/imagen%20del%20n%C3%BAcleo.png'},
  accretionDisk:{innerRadius:18,outerRadius:65,particleCount:8000,particleSize:0.28,colors:['#E8A2A8','#D97F88','#F6D1D5','#F2B9BF','#FFB6C1'],brightness:0.18,orbitalRings:18,ringParticleBase:600,ringParticleIncrement:55},
  particles:{
    coreStars:{count:25000,radius:140,maxHeight:70,size:0.2},
    sphericalHalo:{count:22000,radiusXZ:130,radiusY:65,size:0.15,minDistFromCenter:32},
    backgroundStars:{count:12000,radius:800,size:0.1,floatSpeed:0.012},
    floatingSpace:{count:5000,radius:280,size:0.2,speed:0.005},
    texts:{count:50,width:45,height:20,maxRadius:140,content:["Siempre contigo","Eres mi calma","Me haces feliz","Tu sonrisa brilla","Qué bonito coincidir","Mi lugar favorito","Contigo todo mejora","Tu luz me inspira","Eres increíble","Gracias por existir","Mi corazón te elige","Qué suerte tenerte","Eres mi paz"],colors:[{fill:'#E8A2A8',shadow:'#D97F88'},{fill:'#F6D1D5',shadow:'#E8A2A8'},{fill:'#F2B9BF',shadow:'#D97F88'}]},
    emojis:{count:25,size:10,maxRadius:140,content:['https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda2.png','https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda3.png','https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda6.png'],colors:[{fill:'#F6D1D5',shadow:'#D97F88'},{fill:'#F2B9BF',shadow:'#E8A2A8'},{fill:'#E8A2A8',shadow:'#D97F88'}]}
  },
  shootingStars:{enabled:true,spawnProbability:0.007,speed:1.2},
  lighting:{ambientLight:{color:'#ffffff',intensity:0.06},pointLight:{color:'#E8A2A8',intensity:1.5,distance:400}},
  bloomEffect:{threshold:0.45,strength:0.4,radius:0.3},
  cameraControls:{minDistance:30,maxDistance:300},
  performance:{updateInterval:2,floatUpdateInterval:3}
};

let scene,camera,renderer,controls,galaxyGroup,clock,composer;
let loveTexts=[],loveImages=[],shootingStars=[],floatingParticles=[],orbitalParticles=[],occupiedPositions=[];
let blackHoleMesh,diskParticles,bgStarsMesh,floatMesh;
let frameCount=0;

async function initApp(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  if(!id){showError();return;}
  document.getElementById('load-modal').classList.add('active');
  try{
    const snap=await getDoc(doc(db,"messages",id));
    if(!snap.exists()){showError();return;}
    const d=snap.data();
    if(d.title) document.getElementById('main-title').textContent=d.title;
    if(d.credits) document.getElementById('credits').textContent=d.credits;
    if(d.musicUrl) document.getElementById('background-music').src=d.musicUrl;
    if(d.nucleusUrl) CONFIG.blackHole.imageUrl=d.nucleusUrl;
    if(d.texts && d.texts.length>0) CONFIG.particles.texts.content=d.texts;
    if(d.images && d.images.length>0) CONFIG.particles.emojis.content=d.images;
    document.getElementById('load-modal').classList.remove('active');
    initGalaxy();
  }catch(e){showError();}
}

function showError(){
  document.getElementById('load-modal').classList.remove('active');
  document.getElementById('error-modal').classList.add('active');
  const msg=encodeURIComponent("Hola AnthZz Berrocal, mi detalle de la galaxia no carga o el link está roto. ¿Podrías ayudarme?");
  document.getElementById('wa-btn').href=`https://wa.me/51930569195?text=${msg}`;
}

window.initGalaxy=function(){
  scene=new THREE.Scene();clock=new THREE.Clock();
  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1500);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('galaxy-canvas'),antialias:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));renderer.setSize(innerWidth,innerHeight);renderer.setClearColor(0);
  controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=0.05;
  controls.minDistance=CONFIG.cameraControls.minDistance;controls.maxDistance=CONFIG.cameraControls.maxDistance;controls.enablePan=false;
  composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));
  const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.2,0.35,0.75);
  bloom.threshold=CONFIG.bloomEffect.threshold;bloom.strength=CONFIG.bloomEffect.strength;bloom.radius=CONFIG.bloomEffect.radius;
  composer.addPass(bloom);
  scene.add(new THREE.AmbientLight(CONFIG.lighting.ambientLight.color,CONFIG.lighting.ambientLight.intensity));
  const pl=new THREE.PointLight(CONFIG.lighting.pointLight.color,CONFIG.lighting.pointLight.intensity,CONFIG.lighting.pointLight.distance);scene.add(pl);
  galaxyGroup=new THREE.Group();scene.add(galaxyGroup);
  createBlackHole();createAccretionDisk();createOrbitalRings();createCoreStars();createHalo();createBgStars();createFloats();createLoveElements();
  addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.position.set(0,45,innerWidth<768?190:160);camera.updateProjectionMatrix();});
  onresize();animate();
  document.getElementById('entry-screen').onclick=()=>{
    const m=document.getElementById('background-music');m.volume=0.5;m.play().catch(()=>{});
    document.getElementById('entry-screen').style.display='none';
  };
};

function createBlackHole(){const tl=new THREE.TextureLoader();const tex=tl.load(CONFIG.blackHole.imageUrl,t=>t.colorSpace=THREE.SRGBColorSpace);const g=new THREE.SphereGeometry(CONFIG.blackHole.radius,CONFIG.blackHole.segments,CONFIG.blackHole.segments);blackHoleMesh=new THREE.Mesh(g,new THREE.MeshBasicMaterial({map:tex}));scene.add(blackHoleMesh);}
function createAccretionDisk(){const c=CONFIG.accretionDisk;const pos=new Float32Array(c.particleCount*3),col=new Float32Array(c.particleCount*3);for(let i=0;i<c.particleCount;i++){const r=c.innerRadius+Math.random()*(c.outerRadius-c.innerRadius),a=Math.random()*Math.PI*2;pos.set([r*Math.cos(a),(Math.random()-0.5)*0.5,r*Math.sin(a)],i*3);const co=new THREE.Color(c.colors[i%c.colors.length]);col.set([co.r*c.brightness,co.g*c.brightness,co.b*c.brightness],i*3);}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));diskParticles=new THREE.Points(g,new THREE.PointsMaterial({size:c.particleSize,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,opacity:0.8,depthWrite:false}));galaxyGroup.add(diskParticles);}
function createOrbitalRings(){const c=CONFIG.accretionDisk;for(let r=0;r<c.orbitalRings;r++){const rad=c.innerRadius+(c.outerRadius-c.innerRadius)*(r/c.orbitalRings),pp=Math.min(c.ringParticleBase+r*c.ringParticleIncrement,1000);const pos=new Float32Array(pp*3),col=new Float32Array(pp*3);for(let i=0;i<pp;i++){const a=(i/pp)*Math.PI*2;pos.set([rad*Math.cos(a),0,rad*Math.sin(a)],i*3);const co=new THREE.Color(c.colors[r%c.colors.length]);col.set([co.r*c.brightness*(0.8+Math.random()*0.2),co.g*c.brightness*(0.8+Math.random()*0.2),co.b*c.brightness*(0.8+Math.random()*0.2)],i*3);}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));const ring=new THREE.Points(g,new THREE.PointsMaterial({size:0.32,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,opacity:0.9,depthWrite:false}));ring.userData={speed:0.0012+r*0.0002,offset:Math.random()*Math.PI*2};galaxyGroup.add(ring);orbitalParticles.push(ring);}}
function createCoreStars(){const c=CONFIG.particles.coreStars;const pos=new Float32Array(c.count*3),col=new Float32Array(c.count*3);for(let i=0;i<c.count;i++){const d=CONFIG.accretionDisk.outerRadius+Math.random()*(c.radius-CONFIG.accretionDisk.outerRadius),a=Math.random()*Math.PI*2;pos.set([Math.cos(a)*d,(Math.random()-0.5)*c.maxHeight*Math.pow(1-(d/c.radius),1.5),Math.sin(a)*d],i*3);const h=new THREE.Color().setHSL((0.82+Math.random()*0.12)%1,0.8+Math.random()*0.2,0.6+Math.random()*0.4);col.set([h.r,h.g,h.b],i*3);}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));galaxyGroup.add(new THREE.Points(g,new THREE.PointsMaterial({size:c.size,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,depthWrite:false})));}
function createHalo(){const c=CONFIG.particles.sphericalHalo;const pos=new Float32Array(c.count*3),col=new Float32Array(c.count*3);let f=0;while(f<c.count){const rx=(Math.random()*2-1),ry=(Math.random()*2-1),rz=(Math.random()*2-1);if(rx*rx+ry*ry+rz*rz>1)continue;const x=rx*c.radiusXZ,y=ry*c.radiusY,z=rz*c.radiusXZ;const dist=Math.sqrt(x*x+y*y+z*z);if(dist<c.minDistFromCenter)continue;if(Math.random()>Math.pow(1.0-(dist/Math.max(c.radiusXZ,c.radiusY))*0.7,1.2))continue;pos.set([x,y,z],f*3);const h=new THREE.Color().setHSL((0.82+Math.random()*0.12)%1,0.6+Math.random()*0.4,0.45+Math.random()*0.45);col.set([h.r,h.g,h.b],f*3);f++;}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));galaxyGroup.add(new THREE.Points(g,new THREE.PointsMaterial({size:c.size,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,opacity:0.65,depthWrite:false})));}
function createBgStars(){const c=CONFIG.particles.backgroundStars;const pos=new Float32Array(c.count*3),vel=new Float32Array(c.count*3);for(let i=0;i<c.count;i++){pos.set([(Math.random()-0.5)*2*c.radius,(Math.random()-0.5)*2*c.radius,(Math.random()-0.5)*2*c.radius],i*3);vel.set([(Math.random()-0.5)*c.floatSpeed,(Math.random()-0.5)*c.floatSpeed,(Math.random()-0.5)*c.floatSpeed],i*3);}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('velocity',new THREE.BufferAttribute(vel,3));bgStarsMesh=new THREE.Points(g,new THREE.PointsMaterial({size:c.size,color:0xffffff,transparent:true,opacity:0.3,depthWrite:false}));scene.add(bgStarsMesh);}
function createFloats(){const c=CONFIG.particles.floatingSpace;const pos=new Float32Array(c.count*3),col=new Float32Array(c.count*3),vel=new Float32Array(c.count*3);for(let i=0;i<c.count;i++){const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=c.radius*Math.pow(Math.random(),0.3);pos.set([r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t)],i*3);const h=new THREE.Color().setHSL(0.8+Math.random()*0.15,0.5+Math.random()*0.3,0.7+Math.random()*0.25);col.set([h.r*0.4,h.g*0.4,h.b*0.4],i*3);vel.set([(Math.random()-0.5)*c.speed,(Math.random()-0.5)*c.speed,(Math.random()-0.5)*c.speed],i*3);}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));g.setAttribute('velocity',new THREE.BufferAttribute(vel,3));floatMesh=new THREE.Points(g,new THREE.PointsMaterial({size:c.size,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,opacity:0.5,depthWrite:false}));scene.add(floatMesh);floatingParticles.push(floatMesh);}
function setPos(el,minR,maxR){minR=minR||CONFIG.elementExclusionRadius;maxR=maxR||140;let v=false,a=0,p={x:0,y:0,z:0};while(!v&&a<40){a++;const r=minR+Math.random()*(maxR-minR),t=Math.random()*Math.PI*2,y=(Math.random()-0.5)*20,x=r*Math.cos(t),z=r*Math.sin(t);v=!occupiedPositions.some(op=>Math.hypot(x-op.x,y-op.y,z-op.z)<22);if(v)p={x,y,z};}el.position.set(p.x,p.y,p.z);occupiedPositions.push(p);}
function createLoveElements(){const tc=CONFIG.particles.texts,ec=CONFIG.particles.emojis;for(let i=0;i<tc.count;i++){const cd=tc.colors[i%tc.colors.length];const cv=document.createElement('canvas');cv.width=1536;cv.height=512;const cx=cv.getContext('2d');cx.font='84px "Patrick Hand",cursive';cx.fillStyle=cd.fill;cx.textAlign='center';cx.textBaseline='middle';cx.shadowColor=cd.shadow;cx.shadowBlur=3;const w=tc.content[i%tc.content.length].split(' ');let l=[],c=w[0];for(let j=1;j<w.length;j++){const t=c+' '+w[j];if(cx.measureText(t).width>1436&&c.length>0){l.push(c);c=w[j];}else c=t;}l.push(c);const sy=256-(l.length-1)*50;l.forEach((li,ix)=>cx.fillText(li,768,sy+ix*100));const tx=new THREE.CanvasTexture(cv);tx.needsUpdate=true;const m=new THREE.MeshPhongMaterial({map:tx,transparent:true,alphaTest:0.1,emissive:cd.fill,emissiveIntensity:1.2,depthWrite:false});const mesh=new THREE.Mesh(new THREE.PlaneGeometry(45,20),m);setPos(mesh);galaxyGroup.add(mesh);loveTexts.push(mesh);}
  const tl=new THREE.TextureLoader();for(let i=0;i<ec.count;i++){const tx=tl.load(ec.content[i%ec.content.length],t=>t.colorSpace=THREE.SRGBColorSpace);const m=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthWrite:false}));m.scale.set(ec.size,ec.size,1);setPos(m);galaxyGroup.add(m);loveImages.push(m);}}
function animate(){requestAnimationFrame(animate);frameCount++;const t=clock.getElapsedTime();galaxyGroup.rotation.y=t*CONFIG.galaxy.rotationSpeed;if(blackHoleMesh)blackHoleMesh.rotation.y=t*0.05;if(frameCount%CONFIG.performance.updateInterval===0)orbitalParticles.forEach(r=>{r.rotation.y=t*r.userData.speed+r.userData.offset;});if(floatMesh&&frameCount%CONFIG.performance.floatUpdateInterval===0){const p=floatMesh.geometry.attributes.position,v=floatMesh.geometry.attributes.velocity;for(let i=0;i<p.count;i++)p.setXYZ(i,p.getX(i)+v.getX(i),p.getY(i)+v.getY(i),p.getZ(i)+v.getZ(i));p.needsUpdate=true;}if(bgStarsMesh&&frameCount%CONFIG.performance.floatUpdateInterval===0){const p=bgStarsMesh.geometry.attributes.position,v=bgStarsMesh.geometry.attributes.velocity,r=CONFIG.particles.backgroundStars.radius;for(let i=0;i<p.count;i++){let x=p.getX(i)+v.getX(i),y=p.getY(i)+v.getY(i),z=p.getZ(i)+v.getZ(i);if(Math.abs(x)>r)x=-Math.sign(x)*r*0.98;if(Math.abs(y)>r)y=-Math.sign(y)*r*0.98;if(Math.abs(z)>r)z=-Math.sign(z)*r*0.98;p.setXYZ(i,x,y,z);}p.needsUpdate=true;}loveTexts.forEach(x=>x.lookAt(camera.position));loveImages.forEach(x=>x.lookAt(camera.position));if(CONFIG.shootingStars.enabled&&Math.random()<CONFIG.shootingStars.spawnProbability){const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([0,0,0]),3));const m=new THREE.PointsMaterial({color:0xffffff,size:1.8,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false});const s=new THREE.Points(g,m);s.position.set(THREE.MathUtils.randFloatSpread(1000),THREE.MathUtils.randFloat(150,400),THREE.MathUtils.randFloatSpread(1000));s.userData.velocity=new THREE.Vector3((Math.random()<0.5?-1:1)*CONFIG.shootingStars.speed,-CONFIG.shootingStars.speed*0.5,(Math.random()-0.5)*2);s.userData.life=0;shootingStars.push(s);scene.add(s);}for(let i=shootingStars.length-1;i>=0;i--){shootingStars[i].position.add(shootingStars[i].userData.velocity);shootingStars[i].userData.life++;if(shootingStars[i].userData.life>350){scene.remove(shootingStars[i]);shootingStars.splice(i,1);}}controls.update();composer.render();}
initApp();
</script>
