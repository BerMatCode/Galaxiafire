<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Galaxy of Love ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
      html, body { overflow: hidden; height: 100%; width: 100%; background: #000; font-family: Georgia, serif; touch-action: none; position: relative; }
      .webgl { position: fixed; top: 0; left: 0; width: 100%; height: 100%; outline: none; cursor: pointer; display: block; z-index: 1; }
      .heart { position: absolute; color: rgba(255, 100, 100, 0.2); font-size: 16px; animation: float 18s infinite ease-in-out; z-index: 2; pointer-events: none; text-shadow: 0 0 8px rgba(255,100,100,0.5); will-change: transform, opacity; }
      @keyframes float { 0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 0.6; } 50% { transform: translateY(-30vh) rotate(15deg) scale(1.1); opacity: 0.9; } 90% { opacity: 0.4; } 100% { transform: translateY(-120vh) rotate(30deg) scale(0.9); opacity: 0; } }
      .credits { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); color: #fff; font-family: 'Pacifico', cursive; font-size: 13px; text-align: center; z-index: 100; pointer-events: none; letter-spacing: 2px; text-shadow: 0 0 4px var(--glow1, #ff6030), 0 0 8px var(--glow1, #ff6030), 0 0 15px rgba(255, 96, 48, 0.7); animation: gentleGlow 4s infinite ease-in-out; }
      @keyframes gentleGlow { 0%, 100% { text-shadow: 0 0 4px var(--glow1, #ff6030), 0 0 8px var(--glow1, #ff6030), 0 0 15px rgba(255, 96, 48, 0.7); } 50% { text-shadow: 0 0 6px var(--glow1, #ff6030), 0 0 12px var(--glow1, #ff6030), 0 0 25px rgba(255, 96, 48, 0.9); } }
      .touch-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-family: 'Pacifico', cursive; font-size: 26px; text-align: center; z-index: 100; pointer-events: none; text-shadow: 0 0 10px var(--glow1, #ff6030), 0 0 20px var(--glow1, #ff6030), 0 0 40px rgba(255, 96, 48, 0.9); animation: touchPulse 2s infinite ease-in-out; transition: opacity 0.8s ease, transform 0.8s ease; }
      .touch-text.hidden { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      @keyframes touchPulse { 0%, 100% { text-shadow: 0 0 10px var(--glow1, #ff6030), 0 0 20px var(--glow1, #ff6030), 0 0 40px rgba(255, 96, 48, 0.9); transform: translate(-50%, -50%) scale(1); } 50% { text-shadow: 0 0 15px var(--glow1, #ff6030), 0 0 30px var(--glow1, #ff6030), 0 0 60px rgba(255, 96, 48, 1); transform: translate(-50%, -50%) scale(1.08); } }
      @media (max-width: 768px) { .credits { font-size: 12px; bottom: 14px; } .touch-text { font-size: 22px; } }
      @media (max-width: 480px) { .credits { font-size: 11px; bottom: 12px; letter-spacing: 1px; } .touch-text { font-size: 20px; } }
      .loading-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 20px; }
      .loading-spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #ff6030; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .loading-text { color: #fff; font-family: 'Pacifico', cursive; font-size: 1.2rem; text-shadow: 0 0 10px rgba(255,96,48,0.8); }
      .error-msg { color: #ff6b6b; font-size: 1rem; text-align: center; padding: 20px; display: none; }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Cargando tu galaxia de amor... ✨</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    
    <canvas class="webgl" id="galaxy-canvas"></canvas>
    <audio id="bg-music" loop preload="auto"></audio>
    <div class="credits" id="credits">BerMatCode</div>
    <div class="touch-text" id="touch-text">Toca la pantalla 💛</div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
      import * as THREE from "https://cdn.skypack.dev/three@0.132.2";
      import { OrbitControls } from "https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js";

      // 🔹 NUEVA CONFIGURACIÓN FIREBASE
      const firebaseConfig = {
        apiKey: "AIzaSyAVQn_t-gwbA75W6c1FLLP7OnzuU2jhbs0",
        authDomain: "galaxia-2026.firebaseapp.com",
        projectId: "galaxia-2026",
        storageBucket: "galaxia-2026.firebasestorage.app",
        messagingSenderId: "30252830415",
        appId: "1:30252830415:web:463fbdc73c3fb730d671ba",
        measurementId: "G-XCSVYH6KEG"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // 🔹 Parámetros por defecto (se sobrescriben con Firebase)
      let customParams = {
        centerText: "👑Te quiero👑",
        heartText: "💛Mi Niña💛",
        romanticPhrases: [
          "💛 Te amo 💛", "🌹 Mi amor 🌹", "👑 Mi reina 👑", "💜 And 💜", "🌌 Eres todo 🌌",
          "💫 Para siempre 💫", "🌟 Mi vida 🌟", "☀️ Mi cielo ☀️", "🌅 Mi sol 🌅", "🌸 Bella 🌸",
          "🌺 Hermosa 🌺", "🌷 Preciosa 🌷", "🍬 Dulzura 🍬", "🤗 Cariño 🤗", "💝 Amor mío 💝",
          "👸 Mi princesa 👸", "👼 Mi ángel 👼", "⭐ Mi estrella ⭐", "🌍 Mi mundo 🌍", "💎 Eres única 💎",
          "😍 Te adoro 😍", "🎁 Mi tesoro 🎁", "😊 Mi felicidad 😊", "🕊️ Mi paz 🕊️", "🎉 Mi alegría 🎉",
          "♾️ Por siempre ♾️", "💍 Amor de mi vida 💍"
        ],
        insideColor: '#ff0055',
        outsideColor: '#ff3088',
        musicUrl: 'https://github.com/Baque2005/Organizador/raw/refs/heads/master/Mi%20Coraz%C3%B3n%20Es%20Tuyo%20-%20Axel,%20Kaay%20%20Letra..mp3',
        credits: 'BerMatCode'
      };

      // 🔹 Obtener ID de URL y cargar datos
      async function loadCustomization() {
        const urlParams = new URLSearchParams(window.location.search);
        const messageId = urlParams.get('id');
        
        if (!messageId) {
          document.getElementById('loading').style.display = 'none';
          initGalaxy();
          return;
        }

        try {
          const docRef = doc(db, "messages", messageId);
          const docSnap = await getDoc(docRef);
          
          if (docSnap.exists()) {
            const data = docSnap.data();
            // Aplicar personalizaciones
            if (data.centerText) customParams.centerText = data.centerText;
            if (data.heartText) customParams.heartText = data.heartText;
            if (data.romanticPhrases?.length) customParams.romanticPhrases = data.romanticPhrases;
            if (data.insideColor) customParams.insideColor = data.insideColor;
            if (data.outsideColor) customParams.outsideColor = data.outsideColor;
            if (data.musicUrl) customParams.musicUrl = data.musicUrl;
            if (data.credits) customParams.credits = data.credits;
            
            // Aplicar colores CSS
            document.documentElement.style.setProperty('--glow1', customParams.insideColor);
            document.getElementById('credits').textContent = customParams.credits;
            
            // Configurar música
            const audio = document.getElementById('bg-music');
            audio.innerHTML = `<source src="${customParams.musicUrl}" type="audio/mpeg">`;
            audio.load();
          }
        } catch (error) {
          console.error("Error cargando datos:", error);
          document.getElementById('errorMsg').style.display = 'block';
          document.getElementById('errorMsg').textContent = '⚠️ No se pudo cargar la personalización. Mostrando versión por defecto.';
        } finally {
          document.getElementById('loading').style.display = 'none';
          initGalaxy();
        }
      }

      function createCSSHearts() {
        const heartSymbols = ['💛', '👸', '🌷', '💜', '🅰️', '😘', '❇', '👑'];
        const container = document.body;
        const heartCount = 25;
        for (let i = 0; i < heartCount; i++) {
          const heart = document.createElement('div');
          heart.className = 'heart';
          heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
          heart.style.left = `${Math.random() * 100}%`;
          heart.style.top = `${Math.random() * 100}%`;
          heart.style.fontSize = `${12 + Math.random() * 8}px`;
          heart.style.animationDelay = `${Math.random() * 18}s`;
          heart.style.animationDuration = `${15 + Math.random() * 10}s`;
          container.appendChild(heart);
        }
      }
      createCSSHearts();

      const canvas = document.querySelector('canvas.webgl');
      const scene = new THREE.Scene();
      let textSprites = [], heartStructures = [], centerHeart = null, starfield = null, heartTexts = [];
      let audioStarted = false;
      const audio = document.getElementById('bg-music');
      const touchText = document.getElementById('touch-text');

      const parameters = {
        heartCount: 16, particlesPerHeart: 1000, heartSize: 0.8, heartSizeVariation: 0.2,
        insideColor: customParams.insideColor, outsideColor: customParams.outsideColor,
        centerHeartSize: 3.2, centerHeartParticles: 3000, autoRotateSpeed: 0.25,
        starOpacity: 0.85, textOpacity: 0.9, autoRotate: true
      };

      const createTextSprite = (text) => {
        const c = document.createElement('canvas'), ctx = c.getContext('2d');
        c.width = 500; c.height = 125; ctx.clearRect(0, 0, c.width, c.height);
        ctx.font = 'Bold 48px Georgia'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const gradient = ctx.createLinearGradient(0, 0, c.width, 0);
        gradient.addColorStop(0, parameters.insideColor); gradient.addColorStop(0.5, '#ffffff'); gradient.addColorStop(1, parameters.outsideColor);
        ctx.fillStyle = gradient; ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 22;
        ctx.fillText(text, c.width / 2, c.height / 2);
        const texture = new THREE.CanvasTexture(c);
        const material = new THREE.SpriteMaterial({ map: texture, color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: parameters.textOpacity });
        const sprite = new THREE.Sprite(material); sprite.scale.set(0.9, 0.22, 1); return sprite;
      };

      const createCenterHeartText = () => {
        const c = document.createElement('canvas'), ctx = c.getContext('2d');
        c.width = 768; c.height = 192; ctx.clearRect(0, 0, c.width, c.height);
        ctx.font = 'Bold 85px Pacifico'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const gradient = ctx.createLinearGradient(0, 0, c.width, 0);
        gradient.addColorStop(0, customParams.insideColor); gradient.addColorStop(0.5, '#ffffff'); gradient.addColorStop(1, customParams.outsideColor);
        ctx.fillStyle = gradient; ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 30;
        ctx.fillText(customParams.centerText, c.width / 2, c.height / 2);
        const texture = new THREE.CanvasTexture(c);
        const material = new THREE.SpriteMaterial({ map: texture, color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
        const sprite = new THREE.Sprite(material); sprite.scale.set(2.8, 0.7, 1); return sprite;
      };

      const createHeartText = () => {
        const c = document.createElement('canvas'), ctx = c.getContext('2d');
        c.width = 384; c.height = 96; ctx.clearRect(0, 0, c.width, c.height);
        ctx.font = 'Bold 32px Pacifico'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const gradient = ctx.createLinearGradient(0, 0, c.width, 0);
        gradient.addColorStop(0, customParams.insideColor); gradient.addColorStop(0.5, '#ffffff'); gradient.addColorStop(1, customParams.outsideColor);
        ctx.fillStyle = gradient; ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 15;
        ctx.fillText(customParams.heartText, c.width / 2, c.height / 2);
        const texture = new THREE.CanvasTexture(c);
        const material = new THREE.SpriteMaterial({ map: texture, color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
        const sprite = new THREE.Sprite(material); sprite.scale.set(0.95, 0.24, 1); return sprite;
      };

      const createInvertedHeartGeometry = (size = 1.0, particleCount = 1500) => {
        const positions = new Float32Array(particleCount * 3), colors = new Float32Array(particleCount * 3);
        const colorInside = new THREE.Color(parameters.insideColor), colorOutside = new THREE.Color(parameters.outsideColor);
        for (let i = 0; i < particleCount; i++) {
          const i3 = i * 3, t = Math.random() * Math.PI * 2;
          const x = 16 * Math.pow(Math.sin(t), 3), y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t), z = (Math.random() - 0.5) * 3;
          positions[i3] = (x * size * 0.04) + (Math.random() - 0.5) * size * 0.08;
          positions[i3 + 1] = (y * size * 0.04) + (Math.random() - 0.5) * size * 0.08;
          positions[i3 + 2] = z * size * 0.08;
          const radius = Math.sqrt(x*x + y*y), maxRadius = 20;
          const mixedColor = colorInside.clone(); mixedColor.lerp(colorOutside, Math.min(radius / maxRadius, 1)); mixedColor.offsetHSL(0, 0.5, 0);
          colors[i3] = mixedColor.r; colors[i3 + 1] = mixedColor.g; colors[i3 + 2] = mixedColor.b;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        return geometry;
      };

      const createStarfield = () => {
        const starCount = 6000;
        const positions = new Float32Array(starCount * 3), colors = new Float32Array(starCount * 3), sizes = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
          const i3 = i * 3, radius = 50 + Math.random() * 150, theta = Math.random() * Math.PI * 2, phi = Math.acos(2 * Math.random() - 1);
          positions[i3] = radius * Math.sin(phi) * Math.cos(theta); positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta); positions[i3 + 2] = radius * Math.cos(phi);
          const colorType = Math.random();
          if (colorType < 0.7) { colors[i3] = 1; colors[i3 + 1] = 1; colors[i3 + 2] = 1; } 
          else if (colorType < 0.85) { colors[i3] = 0.7; colors[i3 + 1] = 0.8; colors[i3 + 2] = 1; } 
          else { colors[i3] = 1; colors[i3 + 1] = 0.9; colors[i3 + 2] = 0.7; }
          sizes[i] = 0.2 + Math.random() * 0.4;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        const material = new THREE.PointsMaterial({ size: 0.8, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: parameters.starOpacity, blending: THREE.AdditiveBlending, depthWrite: false });
        return new THREE.Points(geometry, material);
      };

      const generateHearts = () => {
        textSprites.forEach(sprite => scene.remove(sprite)); textSprites = [];
        heartTexts.forEach(text => scene.remove(text)); heartTexts = [];
        heartStructures.forEach(heart => { heart.geometry.dispose(); heart.material.dispose(); scene.remove(heart); }); heartStructures = [];
        if (centerHeart) { centerHeart.geometry.dispose(); centerHeart.material.dispose(); scene.remove(centerHeart); }

        for (let i = 0; i < parameters.heartCount; i++) {
          const heartSize = parameters.heartSize + Math.random() * parameters.heartSizeVariation;
          const heartGeometry = createInvertedHeartGeometry(heartSize, parameters.particlesPerHeart);
          const heartMaterial = new THREE.PointsMaterial({ size: 0.025, sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, opacity: 0.98 });
          const heart = new THREE.Points(heartGeometry, heartMaterial);
          const radius = 3.8, angle = (i / parameters.heartCount) * Math.PI * 2;
          heart.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
          scene.add(heart); heartStructures.push(heart);
          const heartText = createHeartText(); heartText.position.copy(heart.position); scene.add(heartText); heartTexts.push(heartText);
        }

        const centerHeartGeometry = createInvertedHeartGeometry(parameters.centerHeartSize, parameters.centerHeartParticles);
        const centerHeartMaterial = new THREE.PointsMaterial({ size: 0.032, sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending, vertexColors: true, transparent: true, opacity: 0.99 });
        centerHeart = new THREE.Points(centerHeartGeometry, centerHeartMaterial); centerHeart.position.set(0, 0, 0); scene.add(centerHeart);
        const centerText = createCenterHeartText(); centerText.position.set(0, 0.3, 0); scene.add(centerText); textSprites.push(centerText);

        const wordCount = 160;
        for (let i = 0; i < wordCount; i++) {
          const phrase = customParams.romanticPhrases[i % customParams.romanticPhrases.length];
          const radius = 2.0 + Math.random() * 4.0, angle = Math.random() * Math.PI * 2, height = (Math.random() - 0.5) * 3.5;
          const sprite = createTextSprite(phrase);
          sprite.position.set(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
          scene.add(sprite); textSprites.push(sprite);
        }
      };

      function initGalaxy() {
        starfield = createStarfield(); scene.add(starfield); generateHearts();
        const sizes = { width: window.innerWidth, height: window.innerHeight };
        window.addEventListener('resize', () => {
          sizes.width = window.innerWidth; sizes.height = window.innerHeight;
          camera.aspect = sizes.width / sizes.height; camera.updateProjectionMatrix();
          renderer.setSize(sizes.width, sizes.height); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
        const camera = new THREE.PerspectiveCamera(75, sizes.width / sizes.height, 0.1, 200);
        camera.position.set(14, 7, 14); scene.add(camera);
        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.autoRotate = parameters.autoRotate;
        controls.autoRotateSpeed = parameters.autoRotateSpeed; controls.enableZoom = true; controls.enablePan = false;
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(sizes.width, sizes.height); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); renderer.setClearColor(0x000000, 1);

        async function startAudio() {
          if (audioStarted) return;
          touchText.classList.add('hidden'); setTimeout(() => { touchText.style.display = 'none'; }, 900);
          try { audio.volume = 0.4; await audio.play(); audioStarted = true; } 
          catch (err) { try { const AudioContext = window.AudioContext || window.webkitAudioContext; if (AudioContext) { const ctx = new AudioContext(); const buffer = ctx.createBuffer(1, 1, 22050); const source = ctx.createBufferSource(); source.buffer = buffer; source.connect(ctx.destination); source.start(0); setTimeout(() => { ctx.close(); audio.play().then(() => { audioStarted = true; }).catch(() => {}); }, 100); } } catch (e) {} }
        }

        const startEvents = ['click', 'touchstart', 'touchend', 'mousedown', 'keydown'];
        startEvents.forEach(event => { document.addEventListener(event, startAudio, { once: true, passive: true, capture: true }); });
        canvas.addEventListener('click', startAudio, { once: true, passive: true });
        canvas.addEventListener('touchstart', startAudio, { once: true, passive: true });

        const clock = new THREE.Clock();
        const tick = () => {
          const elapsedTime = clock.getElapsedTime(); controls.update();
          textSprites.forEach(sprite => sprite.lookAt(camera.position));
          heartStructures.forEach(heart => heart.lookAt(camera.position));
          if (centerHeart) centerHeart.lookAt(camera.position);
          heartTexts.forEach((text, index) => { if (heartStructures[index]) { text.position.copy(heartStructures[index].position); text.lookAt(camera.position); } });
          const starGeometry = starfield.geometry, starSizes = starGeometry.attributes.size.array;
          for (let i = 0; i < starSizes.length; i++) { const pulse = Math.sin(elapsedTime * 0.5 + i * 0.01) * 0.2 + 0.8; starSizes[i] = (0.2 + Math.random() * 0.4) * pulse; }
          starGeometry.attributes.size.needsUpdate = true;
          renderer.render(scene, camera); window.requestAnimationFrame(tick);
        };
        tick();
      }

      // Iniciar
      loadCustomization();
    </script>
  </body>
</html>
