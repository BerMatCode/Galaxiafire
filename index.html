    function init() {

      const renderScene = new RenderPass(scene, camera);

    function createBlackHole() { const bh=CONFIG.blackHole; const tex=new THREE.TextureLoader().load(bh.imageUrl,t=>{t.colorSpace=THREE.SRGBColorSpace},undefined,e=>console.warn('Núcleo:',e)); const geo=new THREE.SphereGeometry(bh.radius,bh.segments,bh.segments); const mat=new THREE.MeshBasicMaterial({map:tex,transparent:false,opacity:1}); blackHoleMesh=new THREE.Mesh(geo,mat); scene.add(blackHoleMesh); }
    function createAccretionDiskParticles() { const dc=CONFIG.accretionDisk; const geo=new THREE.BufferGeometry(); const pos=new Float32Array(dc.particleCount*3), col=new Float32Array(dc.particleCount*3), sizes=new Float32Array(dc.particleCount); const c=new THREE.Color(); for(let i=0;i<dc.particleCount;i++){const r=dc.innerRadius+Math.random()*(dc.outerRadius-dc.innerRadius),a=Math.random()*Math.PI*2,sp=0.8;const x=r*Math.cos(a),z=r*Math.sin(a),y=(Math.random()-.5)*sp;pos.set([x,y,z],i*3);const ch=dc.colors[Math.floor(Math.random()*dc.colors.length)];c.set(ch);col.set([c.r*dc.brightness,c.g*dc.brightness,c.b*dc.brightness],i*3);const bs=dc.particleSize,df=1-(r-dc.innerRadius)/(dc.outerRadius-dc.innerRadius);sizes[i]=bs*(.6+df*.8);} geo.setAttribute('position',new THREE.BufferAttribute(pos,3)); geo.setAttribute('color',new THREE.BufferAttribute(col,3)); geo.setAttribute('size',new THREE.BufferAttribute(sizes,1)); const mat=new THREE.PointsMaterial({size:dc.particleSize,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,opacity:.7,sizeAttenuation:true}); const pts=new THREE.Points(geo,mat); pts.rotation.x=0; galaxyGroup.add(pts); }
    function createOrbitalRings() { const dc=CONFIG.accretionDisk; for(let r=0;r<dc.orbitalRings;r++){const radius=dc.innerRadius+(dc.outerRadius-dc.innerRadius)*(r/dc.orbitalRings);const ppr=Math.floor(400+r*30);const geo=new THREE.BufferGeometry();const pos=new Float32Array(ppr*3),col=new Float32Array(ppr*3);const c=new THREE.Color();for(let i=0;i<ppr;i++){const a=(i/ppr)*Math.PI*2,x=radius*Math.cos(a),z=radius*Math.sin(a),y=0;pos.set([x,y,z],i*3);const ch=dc.colors[r%dc.colors.length];c.set(ch);const br=dc.brightness*(.7+Math.random()*.3);col.set([c.r*br,c.g*br,c.b*br],i*3);} geo.setAttribute('position',new THREE.BufferAttribute(pos,3)); geo.setAttribute('color',new THREE.BufferAttribute(col,3)); const mat=new THREE.PointsMaterial({size:.4,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,opacity:.8});const ring=new THREE.Points(geo,mat);ring.userData={radius,speed:.002+r*.0003,offset:Math.random()*Math.PI*2};ring.rotation.x=0;galaxyGroup.add(ring);orbitalParticles.push(ring);} }
    function createCoreStars() { const cc=CONFIG.particles.coreStars; const geo=new THREE.BufferGeometry(); const pos=new Float32Array(cc.count*3),col=new Float32Array(cc.count*3); const c=new THREE.Color(); for(let i=0;i<cc.count;i++){const d=CONFIG.accretionDisk.outerRadius+Math.random()*(cc.radius-CONFIG.accretionDisk.outerRadius);const a=Math.random()*Math.PI*2;const y=(Math.random()-.5)*cc.maxHeight*Math.pow(1-(d/cc.radius),1.5);pos.set([Math.cos(a)*d,y,Math.sin(a)*d],i*3);const h=.82+Math.random()*.12,s=.8+Math.random()*.2,l=.6+Math.random()*.4;c.setHSL(h%1,s,l);col.set([c.r,c.g,c.b],i*3);} geo.setAttribute('position',new THREE.BufferAttribute(pos,3)); geo.setAttribute('color',new THREE.BufferAttribute(col,3)); const mat=new THREE.PointsMaterial({size:cc.size,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true}); galaxyGroup.add(new THREE.Points(geo,mat)); }
    function createSphericalHalo() { const hc=CONFIG.particles.sphericalHalo; const geo=new THREE.BufferGeometry(); const pos=new Float32Array(hc.count*3),col=new Float32Array(hc.count*3); const c=new THREE.Color(); let filled=0; while(filled<hc.count){const rx=Math.random()*2-1,ry=Math.random()*2-1,rz=Math.random()*2-1;if(rx*rx+ry*ry+rz*rz>1)continue;const x=rx*hc.radiusXZ,y=ry*hc.radiusY,z=rz*hc.radiusXZ;const dfc=Math.sqrt(x*x+y*y+z*z);if(dfc<hc.minDistFromCenter)continue;const rn=dfc/Math.max(hc.radiusXZ,hc.radiusY);if(Math.random()>Math.pow(1-rn*.7,1.2))continue;pos.set([x,y,z],filled*3);const h=.82+Math.random()*.12,s=.6+Math.random()*.4,l=.45+Math.random()*.45;c.setHSL(h%1,s,l);col.set([c.r,c.g,c.b],filled*3);filled++;} geo.setAttribute('position',new THREE.BufferAttribute(pos,3)); geo.setAttribute('color',new THREE.BufferAttribute(col,3)); const mat=new THREE.PointsMaterial({size:hc.size,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,opacity:.65}); galaxyGroup.add(new THREE.Points(geo,mat)); }

    function createFloatingSpaceParticles() { const fc=CONFIG.particles.floatingSpace; const geo=new THREE.BufferGeometry(); const pos=new Float32Array(fc.count*3),col=new Float32Array(fc.count*3),vel=new Float32Array(fc.count*3); const co=new THREE.Color(); for(let i=0;i<fc.count;i++){const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=fc.radius*Math.pow(Math.random(),.3);const x=r*Math.sin(ph)*Math.cos(th),y=r*Math.cos(ph),z=r*Math.sin(ph)*Math.sin(th);pos.set([x,y,z],i*3);const h=.8+Math.random()*.15,s=.5+Math.random()*.3,l=.7+Math.random()*.25;co.setHSL(h,s,l);col.set([co.r*.5,co.g*.5,co.b*.5],i*3);vel.set([(Math.random()-.5)*fc.speed,(Math.random()-.5)*fc.speed,(Math.random()-.5)*fc.speed],i*3);} geo.setAttribute('position',new THREE.BufferAttribute(pos,3)); geo.setAttribute('color',new THREE.BufferAttribute(col,3)); geo.setAttribute('velocity',new THREE.BufferAttribute(vel,3)); const mat=new THREE.PointsMaterial({size:fc.size,blending:THREE.AdditiveBlending,vertexColors:true,transparent:true,opacity:.6}); const fl=new THREE.Points(geo,mat); fl.userData.isFloating=true; scene.add(fl); floatingParticles.push(fl); }
    function createLoveElements() { const tc=CONFIG.particles.texts,ec=CONFIG.particles.emojis; for(let i=0;i<tc.count;i++){const cd=tc.colors[i%tc.colors.length];const ph=tc.content[i%tc.content.length];const tex=createTextTexture(ph,cd);const mat=new THREE.MeshPhongMaterial({map:tex,transparent:true,alphaTest:.1,emissive:cd.fill,emissiveIntensity:1.2});const mesh=new THREE.Mesh(new THREE.PlaneGeometry(tc.width,tc.height),mat);setElementOrbitPosition(mesh,tc.minRadius,tc.maxRadius);galaxyGroup.add(mesh);loveTexts.push(mesh);} const tl=new THREE.TextureLoader(); for(let i=0;i<ec.count;i++){const img=ec.content[i%ec.content.length],cd=ec.colors[i%ec.colors.length];const tex=tl.load(img,t=>{t.colorSpace=THREE.SRGBColorSpace;t.transparent=true},undefined,e=>console.warn('Img:',img,e));tex.minFilter=tex.magFilter=THREE.LinearFilter;const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});const sp=new THREE.Sprite(mat);sp.scale.set(ec.size,ec.size,1);setElementOrbitPosition(sp,ec.minRadius,ec.maxRadius);galaxyGroup.add(sp);loveImages.push(sp);} }
    function createShootingStar() { const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array([0,0,0]),3)); const mat=new THREE.PointsMaterial({color:0xffffff,size:1.8,blending:THREE.AdditiveBlending,transparent:true}); const star=new THREE.Points(geo,mat); const [x,y,z]=[THREE.MathUtils.randFloatSpread(800),THREE.MathUtils.randFloat(100,300),THREE.MathUtils.randFloatSpread(800)]; star.position.set(x,y,z); star.userData.velocity=new THREE.Vector3((Math.random()<.5?-1:1)*CONFIG.shootingStars.speed,-CONFIG.shootingStars.speed*.5,(Math.random()-.5)*2); star.userData.life=0; shootingStars.push(star); scene.add(star); }
    function setElementOrbitPosition(el,minR,maxR) { const sMin=minR||CONFIG.elementExclusionRadius,sMax=maxR||CONFIG.particles.coreStars.radius; const minSep=18,maxAtt=50; let valid=false,att=0,fp={x:0,y:0,z:0}; while(!valid&&att<maxAtt){att++;const r=sMin+Math.random()*(sMax-sMin),th=Math.random()*Math.PI*2,mvo=15;const y=(Math.random()-.5)*mvo,x=r*Math.cos(th),z=r*Math.sin(th);valid=true;for(let p of occupiedPositions){const d=Math.sqrt((x-p.x)**2+(y-p.y)**2+(z-p.z)**2);if(d<minSep){valid=false;break;}}if(valid)fp={x,y,z};} el.position.set(fp.x,fp.y,fp.z); occupiedPositions.push(fp); }
    function createTextTexture(text,color) { const cv=document.createElement('canvas');cv.width=1536;cv.height=512;const ctx=cv.getContext('2d');ctx.font='84px "Patrick Hand",cursive';ctx.fillStyle=color.fill;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor=color.shadow;ctx.shadowBlur=3;const words=text.split(' ');let lines=[],cl=words[0];const mw=cv.width-100,lh=100;for(let i=1;i<words.length;i++){const tl=cl+' '+words[i];if(ctx.measureText(tl).width>mw&&cl.length>0){lines.push(cl);cl=words[i];}else cl=tl;} lines.push(cl);const sy=cv.height/2-(lines.length-1)*lh/2;lines.forEach((l,idx)=>ctx.fillText(l,cv.width/2,sy+idx*lh));return new THREE.CanvasTexture(cv); }
    function onWindowResize() { const w=innerWidth,h=innerHeight; renderer.setSize(w,h); composer.setSize(w,h); camera.aspect=w/h; camera.position.set(0,35,w<768?150:120); camera.updateProjectionMatrix(); }
    function animate() { requestAnimationFrame(animate); const et=clock.getElapsedTime(); galaxyGroup.rotation.y=et*CONFIG.galaxy.rotationSpeed; if(blackHoleMesh)blackHoleMesh.rotation.y=et*.05; orbitalParticles.forEach(r=>{r.rotation.y=et*r.userData.speed+r.userData.offset;}); floatingParticles.forEach(fp=>{const pos=fp.geometry.attributes.position,vel=fp.geometry.attributes.velocity;for(let i=0;i<pos.count;i++)pos.setXYZ(i,pos.getX(i)+vel.getX(i),pos.getY(i)+vel.getY(i),pos.getZ(i)+vel.getZ(i));pos.needsUpdate=true;}); const bg=scene.children.find(c=>c.userData?.isBackground); if(bg){const pos=bg.geometry.attributes.position,vel=bg.geometry.attributes.velocity;for(let i=0;i<pos.count;i++){let x=pos.getX(i)+vel.getX(i),y=pos.getY(i)+vel.getY(i),z=pos.getZ(i)+vel.getZ(i);const r=CONFIG.particles.backgroundStars.radius;if(Math.abs(x)>r)x=-Math.sign(x)*r*.95;if(Math.abs(y)>r)y=-Math.sign(y)*r*.95;if(Math.abs(z)>r)z=-Math.sign(z)*r*.95;pos.setXYZ(i,x,y,z);}pos.needsUpdate=true;} loveTexts.forEach(t=>t.lookAt(camera.position)); loveImages.forEach(i=>i.lookAt(camera.position)); if(CONFIG.shootingStars.enabled&&Math.random()<CONFIG.shootingStars.spawnProbability)createShootingStar(); shootingStars.forEach((star,idx)=>{star.position.add(star.userData.velocity);star.userData.life++;if(star.userData.life>300){scene.remove(star);shootingStars.splice(idx,1);}}); controls.update(); composer.render(); }

    // ✅ Audio optimizado
    document.getElementById('entry-screen').addEventListener('click', async () => {
      const screen = document.getElementById('entry-screen');
      screen.style.opacity = '0';
      setTimeout(() => screen.style.display = 'none', 600);
      if (!musicPlayed) {
        const music = document.getElementById('background-music');
        if (music.src) {
          try {
            await music.play();
            musicPlayed = true;
          } catch (err) { console.warn('Audio:', err); }
        }
      }
    }, { passive: true });

    document.addEventListener('contextmenu', e => e.preventDefault(), { passive: false });
    document.onkeydown = function(e) {
      if (e.keyCode==123 || (e.ctrlKey && e.shiftKey && (e.keyCode=='I'.charCodeAt(0)||e.keyCode=='J'.charCodeAt(0)||e.keyCode=='C'.charCodeAt(0))) || (e.ctrlKey && (e.keyCode=='U'.charCodeAt(0)||e.keyCode=='S'.charCodeAt(0)))) return false;
    };

    loadConfig();
  </script>
</body>
