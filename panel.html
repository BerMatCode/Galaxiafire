<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear mi Galaxia</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
body { font-family: 'Roboto', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
.panel { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 0 30px rgba(56,189,248,0.2); border: 1px solid #334155; }
h2 { text-align: center; color: var(--primary); font-family: 'Patrick Hand'; font-size: 2rem; margin-top: 0; }
.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #94a3b8; }
input, textarea { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 8px; box-sizing: border-box; }
input:focus, textarea:focus { outline: none; border-color: var(--primary); }

/* Image Grid */
.img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 5px; }
.img-opt { aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.2s; position: relative; }
.img-opt img { width: 100%; height: 100%; object-fit: cover; }
.img-opt.selected { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
.img-opt.disabled { opacity: 0.3; pointer-events: none; }

/* Token Section */
.token-row { display: flex; gap: 10px; }
.btn-check { background: var(--primary); border: none; color: #000; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.locked { opacity: 0.5; pointer-events: none; filter: grayscale(1); }

/* Main Button */
.btn-gen { width: 100%; padding: 12px; background: linear-gradient(45deg, #0ea5e9, #38bdf8); border: none; border-radius: 10px; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; transition: 0.3s; }
.btn-gen:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14,165,233,0.4); }

/* Modals */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
.modal.active { display: flex; }
.modal-content { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; width: 90%; border: 1px solid var(--primary); animation: popIn 0.3s; }
@keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
.avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); margin: 0 auto 15px; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.btn-action { display: block; width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; }
.btn-tiktok { background: #000; color: #fff; border: 1px solid #333; }
.btn-success { background: #10b981; color: #fff; }
.link-box { background: #0f172a; padding: 10px; border-radius: 5px; word-break: break-all; font-size: 0.8rem; margin: 15px 0; color: var(--primary); }
</style>
</head>
<body>

<div class="panel">
  <h2>🌌 Crear Galaxia</h2>
  
  <div class="form-group">
    <label>Título Principal</label>
    <input type="text" id="inp-title" value="Te Amo Yorchi" placeholder="Ej: Feliz Aniversario">
  </div>

  <div class="form-group">
    <label>Frases Flotantes (Separadas por coma)</label>
    <textarea id="inp-texts" rows="3" placeholder="Eres increíble, Te amo, Mi vida...">Eres increíble, Te amo mucho, Mi universo, Siempre juntos</textarea>
  </div>

  <div class="form-group">
    <label>Música (URL MP3)</label>
    <input type="text" id="inp-music" value="https://github.com/BerMatCode/Archivos/raw/refs/heads/main/Multimedia/TikVid.io_7471239338752363781.mp3">
  </div>

  <div class="form-group">
    <label>Imágenes Flotantes (Máx 4)</label>
    <div class="img-grid" id="img-grid"></div>
    <small style="color:#64748b">Selecciona las que quieras mostrar</small>
  </div>

  <div class="form-group">
    <label>🔒 Opciones Avanzadas</label>
    <div class="token-row">
      <input type="password" id="inp-token" placeholder="Token de acceso">
      <button class="btn-check" onclick="checkToken()">OK</button>
    </div>
  </div>

  <div id="adv-section" class="locked">
    <div class="form-group">
      <label>URL Núcleo Agujero Negro</label>
      <input type="text" id="inp-nucleus" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Créditos Inferiores</label>
      <input type="text" id="inp-credits" value="𖤍BerMatCode𖤍">
    </div>
  </div>

  <button class="btn-gen" onclick="startProcess()">✨ Generar Link</button>
</div>

<!-- Modal TikTok -->
<div id="modal-tiktok" class="modal">
  <div class="modal-content">
    <div class="avatar"><img src="https://raw.githubusercontent.com/BerMatCode/Galafire/main/Multimedia/Screenshot_20260225-092058.jpg"></div>
    <h3>Sígueme en TikTok</h3>
    <p>Para generar tu detalle, sigue mi perfil y regresa.</p>
    <a href="https://www.tiktok.com/@bermatcode" target="_blank" class="btn-action btn-tiktok" onclick="tiktokDone()">
      <i class="fab fa-tiktok"></i> Seguir Ahora
    </a>
  </div>
</div>

<!-- Modal Loading -->
<div id="modal-load" class="modal">
  <div class="modal-content">
    <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:var(--primary)"></i>
    <p>Creando universo...</p>
  </div>
</div>

<!-- Modal Success -->
<div id="modal-success" class="modal">
  <div class="modal-content">
    <i class="fas fa-check-circle" style="font-size:3rem; color:#10b981; margin-bottom:10px"></i>
    <h3>¡Listo!</h3>
    <p>Tu galaxia ha sido creada.</p>
    <div class="link-box" id="final-link">...</div>
    <button class="btn-action btn-success" onclick="copyLink()">Copiar Link</button>
    <button class="btn-action" style="background:#334155; color:#fff" onclick="location.reload()">Crear Otro</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAVQn_t-gwbA75W6c1FLLP7OnzuU2jhbs0",
  authDomain: "galaxia-2026.firebaseapp.com",
  projectId: "galaxia-2026",
  storageBucket: "galaxia-2026.firebasestorage.app",
  messagingSenderId: "30252830415",
  appId: "1:30252830415:web:463fbdc73c3fb730d671ba"
});
const db = getFirestore(app);

// Lista de Imágenes Disponibles
const IMG_LIST = [
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda1.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda2.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda3.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda4.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda5.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda6.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda7.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda8.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/panda9.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/pandaa.png',
  'https://raw.githubusercontent.com/BerMatCode/Archivos/main/Multimedia/pandad.png'
];

let selectedImgs = [];
let tokenValid = false;

// Renderizar Grid
const grid = document.getElementById('img-grid');
IMG_LIST.forEach((url, idx) => {
  const div = document.createElement('div');
  div.className = 'img-opt';
  // Predeterminados: panda2, panda3, panda6 (índices 2, 3, 6)
  if([2,3,6].includes(idx)) { div.classList.add('selected'); selectedImgs.push(url); }
  div.innerHTML = `<img src="${url}">`;
  div.onclick = () => toggleImg(div, url);
  grid.appendChild(div);
});

window.toggleImg = (el, url) => {
  if(el.classList.contains('selected')) {
    el.classList.remove('selected');
    selectedImgs = selectedImgs.filter(u => u !== url);
  } else {
    if(selectedImgs.length >= 4) return alert("Máximo 4 imágenes");
    el.classList.add('selected');
    selectedImgs.push(url);
  }
  updateGridState();
};

function updateGridState() {
  document.querySelectorAll('.img-opt').forEach(el => {
    if(!el.classList.contains('selected') && selectedImgs.length >= 4) el.classList.add('disabled');
    else el.classList.remove('disabled');
  });
}

window.checkToken = () => {
  if(document.getElementById('inp-token').value === "101123") {
    tokenValid = true;
    document.getElementById('adv-section').classList.remove('locked');
    alert("✅ Token Correcto. Opciones desbloqueadas.");
  } else {
    alert("❌ Token Incorrecto");
  }
};

window.startProcess = () => {
  document.getElementById('modal-tiktok').classList.add('active');
};

window.tiktokDone = async () => {
  document.getElementById('modal-tiktok').classList.remove('active');
  document.getElementById('modal-load').classList.add('active');
  
  // Preparar datos
  const texts = document.getElementById('inp-texts').value.split(',').map(t=>t.trim()).filter(t=>t);
  const data = {
    title: document.getElementById('inp-title').value,
    musicUrl: document.getElementById('inp-music').value,
    images: selectedImgs,
    customTexts: texts,
    createdAt: serverTimestamp()
  };

  if(tokenValid) {
    data.nucleusUrl = document.getElementById('inp-nucleus').value;
    data.credits = document.getElementById('inp-credits').value;
  }

  try {
    const ref = await addDoc(collection(db, "messages"), data);
    const link = `${window.location.origin}${window.location.pathname.replace('panel.html','index.html')}?id=${ref.id}`;
    
    setTimeout(() => {
      document.getElementById('modal-load').classList.remove('active');
      document.getElementById('modal-success').classList.add('active');
      document.getElementById('final-link').textContent = link;
      window.finalLink = link;
    }, 2000);
  } catch(e) {
    alert("Error al guardar: " + e.message);
    document.getElementById('modal-load').classList.remove('active');
  }
};

window.copyLink = () => {
  navigator.clipboard.writeText(window.finalLink);
  alert("Link copiado!");
};
</script>
</body>
</html>
